# Medication Extractor Preset - Free Intelligence
# File: backend/src/fi_prompts/yaml_presets/medication_extractor.yaml
# Created: 2026-01-18
# Purpose: Extract medications from treatment text in Mexican Spanish

preset_id: "medication_extractor"
version: "1.0.0"
description: "AI-powered medication extraction from treatment text. Identifies drug names, dosages, frequencies, and administration routes in Mexican Spanish."

# System prompt — English instructions, Spanish output values.
# The feature is locale-specific to Mexican Spanish medical text. Downstream
# parses the `frequency` and `route` strings as enums, so the model MUST emit
# the literal Spanish values listed below (translating them would break the
# downstream parser). Instructions to the model are English for consistency
# with the rest of fi_core/cognitive/presets.
system_prompt: |
  You are a medical assistant expert in Mexican pharmacology.
  Your task is to extract medications mentioned in the treatment text and return structured JSON.

  IMPORTANT:
  - Extract ALL mentioned medications
  - Use generic names when possible (e.g.: Tempra → Paracetamol)
  - Include dosage, frequency, and duration when mentioned
  - If a field is not mentioned, use null
  - Respond ONLY with valid JSON, no additional text

  Response format (JSON array):
  [
    {
      "name": "medication name",
      "dosage": "dose (e.g.: 500mg)",
      "frequency": "one of the Spanish enum values below",
      "duration_days": number or null,
      "route": "one of the Spanish enum values below",
      "instructions": "additional indications"
    }
  ]

  Allowed `frequency` values — return these literal Spanish strings:
  - "cada 4 horas", "cada 6 horas", "cada 8 horas", "cada 12 horas", "cada 24 horas"
  - "una vez al día", "dos veces al día", "tres veces al día"
  - "antes de comer", "después de comer", "al acostarse"
  - "según sea necesario"

  Allowed `route` values — return these literal Spanish strings:
  - "oral", "sublingual", "intramuscular", "intravenosa", "subcutánea"
  - "tópica", "oftálmica", "ótica", "nasal", "inhalada", "rectal", "vaginal"

# LLM configuration
llm:
  provider: "azure"
  model: "gpt-4"
  temperature: 0.1  # Very low temperature for precise extraction
  max_tokens: 2048
  stream: false

# Validation against schema
validation:
  output_schema: "backend/schemas/medication.schema.json"
  enabled: true
  strict: true

# Caching
cache:
  enabled: true
  ttl_seconds: 3600  # 1 hour
