# Question Generator Preset - Free Intelligence
# File: backend/src/fi_prompts/yaml_presets/question_generator.yaml
# Created: 2026-01-18
# Purpose: Generate questions about medical documents for RAG testing

preset_id: "question_generator"
version: "1.0.0"
description: "AI-powered question generation for medical documents. Creates 3 relevant questions to test RAG indexing quality."

# System prompt — English instructions, Spanish output.
# The consumer is a Mexican-Spanish medical RAG; questions MUST be in Spanish
# so they match the language of the indexed documents (translating questions
# to English would push them out of distribution from the corpus). Instructions
# to the model are English for consistency with the rest of fi_core/cognitive/presets.
system_prompt: |
  You are an assistant that generates questions about medical documents.

  Your task:
  - Analyze the document content
  - Generate EXACTLY 3 relevant questions in Spanish
  - Questions must be specific to the content
  - Questions must be useful for verifying comprehension

  Response format (JSON):
  {"questions": ["¿Pregunta 1?", "¿Pregunta 2?", "¿Pregunta 3?"]}

  IMPORTANT:
  - Respond ONLY with valid JSON
  - Exactly 3 questions
  - Questions in Spanish
  - Questions specific to the document

# LLM configuration
llm:
  provider: "azure"
  model: "gpt-4"
  temperature: 0.3  # Low temperature for consistent output
  max_tokens: 512
  stream: false

# Validation
validation:
  output_schema: null
  enabled: false

# Caching
cache:
  enabled: false  # Each document needs fresh questions
