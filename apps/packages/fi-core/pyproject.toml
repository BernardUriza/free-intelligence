[project]
name = "fi-core"
version = "0.16.0"
description = "Free Intelligence core — shared LLM primitives (RAG chunking + protocols, HDF5 + pgvector stores, Azure OpenAI + sentence-transformers embedders, persona character-integrity detection + MCP server) used by AURITY and Insult"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Bernard Uriza Orozco" },
]
license = { text = "MIT" }
keywords = ["rag", "chunking", "embeddings", "fi-core", "llm", "persona", "character-drift", "anti-drift", "hdf5", "vector-store", "mcp", "model-context-protocol", "pgvector", "azure-openai", "sentence-transformers"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[project.optional-dependencies]
# HDF5-backed DocumentChunkStore implementation.
# Required for fi_core.stores.hdf5.HDF5ChunkStore.
stores-hdf5 = [
    "h5py>=3.10",
    "numpy>=1.24,<3",
]

# Postgres + pgvector-backed DocumentChunkStore implementation.
# Required for fi_core.stores.pgvector.PgVectorChunkStore.
# Use this for multi-tenant chat substrates needing concurrent writes,
# relational filters, and transactional consistency.
stores-pgvector = [
    "asyncpg>=0.30",
    "pgvector>=0.4",
]

# Azure OpenAI-backed Embedder. Required for
# fi_core.embeddings.azure_openai.AzureOpenAIEmbedder.
embeddings-azure = [
    "openai>=1.40",
]

# Local sentence-transformers Embedder. Loads a model into the host
# process; CPU-only by default, picks GPU via torch.cuda.is_available
# when device=None. Required for
# fi_core.embeddings.sentence_transformers.SentenceTransformersEmbedder.
embeddings-st = [
    "sentence-transformers>=2.5",
    "torch>=2.0",
]

# MCP servers exposing fi-core primitives as tools for AI agents: persona
# (anti-drift), cognitive (clinical flow), and rag (chunking + retrieval).
# Required for `python -m fi_core.{persona,cognitive,rag}.mcp_server`.
mcp = [
    "mcp>=1.4,<2",
]

# Training utilities: TinyGPT + PyTorchTrainer + tokenizers + dataset readers.
# Required for any sub-module under fi_core.training.* (other than protocols).
# Pulls torch (heavy — only install when you actually train).
training = [
    "torch>=2.0",
    "tiktoken>=0.7",
    "tokenizers>=0.20",
    "pyyaml>=6",
]

# Long-term memory primitives: PgMemoryStore + FactConsolidator + retention.
# Same deps as stores-pgvector (asyncpg + pgvector) — separate extra so the
# semantic install intent is explicit at the caller site.
memory = [
    "asyncpg>=0.30",
    "pgvector>=0.4",
]

# Cognitive flow: YAML prompt presets (intake/SOAP/triage/etc.) as typed
# CognitivePreset objects. The core (types + discovery) is dep-free; loading
# a preset's YAML needs PyYAML.
cognitive = [
    "pyyaml>=6",
]

# Convenience: install everything available so far.
all = [
    "h5py>=3.10",
    "numpy>=1.24,<3",
    "asyncpg>=0.30",
    "pgvector>=0.4",
    "openai>=1.40",
    "sentence-transformers>=2.5",
    "torch>=2.0",
    "mcp>=1.4,<2",
    "tiktoken>=0.7",
    "tokenizers>=0.20",
    "pyyaml>=6",
]

dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-postgresql>=6.0",
    "psycopg[binary]>=3.1",
    "ruff>=0.11",
    "h5py>=3.10",
    "numpy>=1.24,<3",
    "asyncpg>=0.30",
    "pgvector>=0.4",
    "openai>=1.40",
    "sentence-transformers>=2.5",
    "torch>=2.0",
    "mcp>=1.4,<2",
    "tiktoken>=0.7",
    "tokenizers>=0.20",
    "pyyaml>=6",
]

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fi_core*"]
exclude = ["tests*"]

[tool.setuptools.package-data]
"fi_core.cognitive" = ["presets/*.yaml"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "slow: marks tests that load heavy resources (e.g. real sentence-transformers model). Run with `-m slow` to include; default invocation skips them unless explicitly selected.",
    "integration: marks tests needing external infra (e.g. a pgvector DB via FI_RAG_PGVECTOR_TEST_DSN). Skipped unless that infra is configured.",
]
