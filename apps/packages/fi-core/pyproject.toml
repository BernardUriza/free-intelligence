[project]
name = "fi-core"
version = "0.4.0"
description = "Free Intelligence core — shared LLM primitives (RAG chunking + Embedder/ChunkStore protocols, HDF5 store, persona character-integrity detection + MCP server) used by AURITY and Insult"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Bernard Uriza Orozco" },
]
license = { text = "MIT" }
keywords = ["rag", "chunking", "embeddings", "fi-core", "llm", "persona", "character-drift", "anti-drift", "hdf5", "vector-store", "mcp", "model-context-protocol"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[project.optional-dependencies]
# HDF5-backed DocumentChunkStore implementation.
# Required for fi_core.stores.hdf5.HDF5ChunkStore.
stores-hdf5 = [
    "h5py>=3.10",
    "numpy>=1.24",
]

# MCP server exposing fi_core.persona detectors as tools for AI agents.
# Required for `python -m fi_core.persona.mcp_server`.
mcp = [
    "mcp>=1.4",
]

# Convenience: install everything available so far.
all = [
    "h5py>=3.10",
    "numpy>=1.24",
    "mcp>=1.4",
]

dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "h5py>=3.10",
    "numpy>=1.24",
    "mcp>=1.4",
]

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fi_core*"]
exclude = ["tests*"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
