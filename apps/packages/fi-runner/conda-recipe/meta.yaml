{% set name = "fi-runner" %}
{# Version is the single source of truth in fi_runner/__init__.py + pyproject.
   The publish workflow (.github/workflows/publish-fi-runner.yml) seds this from
   the pushed `fi-runner-v*` tag, so a build always packages the tagged commit.
   Bump it here too when cutting a release so a manual `conda build` matches. #}
{% set version = "0.15.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # Build from the package source in-tree (the dir above this recipe), not a
  # pinned release tarball. Kills the version+sha256 drift that left the
  # Anaconda channel stuck at 0.3.0 while the code moved to 0.8.0 — there's no
  # tarball URL/hash to keep in sync anymore; CI builds whatever commit the
  # tag points at.
  path: ..

build:
  number: 0
  noarch: python
  # PIP_USER=0 overrides any user-site setting that breaks conda-build's
  # prefix-relative install path.
  script: PIP_USER=0 {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=3.12
    # 0.20: rag_store capability + RagStore client need fi-core's store service.
    - fi-core >=0.23
    # Harness SDKs (claude-agent-sdk, codex) are pip-only and installed
    # per-deployment via the [claude] / [codex] extras — they are intentionally
    # NOT conda run deps (the core import is dep-free).

test:
  imports:
    - fi_runner
    - fi_runner.backend
    - fi_runner.runner
    - fi_runner.capabilities
    - fi_runner.backends
  requires:
    - pip
  commands:
    - pip check
    # Zero-dep smoke: the port + Runner + capability wiring import without any
    # harness SDK present.
    - python -c "from fi_runner import AgentBackend, Runner, ToolPolicy, MCPServerSpec, PermissionMode, ClaudeCodeBackend, CodexBackend, ProviderConfig; print('fi-runner import ok')"

about:
  home: https://github.com/BernardUriza/free-intelligence/tree/main/apps/packages/fi-runner
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: >
    Backend-agnostic agent runner framework over fi-core: an AgentBackend port
    (Claude Code / Codex harnesses) + a Runner composing personas, fi-core
    capabilities (wired as MCP servers), and a per-runner ToolPolicy.
  description: |
    fi-runner is the runner-framework tier of Free Intelligence. It abstracts
    the agent HARNESS so runners (insult, alice, fi-medic) are not copy-pasted
    per backend:

    - **AgentBackend** (port) with ClaudeCodeBackend (claude_agent_sdk; Max
      subscription via OAuth; stateful pooled sessions; in-process + stdio MCP;
      cwd/setting_sources) and CodexBackend (codex exec --json) — the latter
      runs either on a ChatGPT login OR, via a ProviderConfig, as an API motor
      against any OpenAI-compatible endpoint (Azure, OpenAI, OpenRouter, ...).
    - **Runner**(backend, persona, capabilities, extra_mcp_servers, tool_policy,
      model) — capabilities (e.g. "cognitive", "persona") resolve to fi-core MCP
      servers; extra_mcp_servers carries runner-specific MCP servers.
    - **ToolPolicy** — per-runner security (built-in tools allow/deny + the
      permission mode), e.g. a medical runner blocks Bash/Write for PHI.

    The unifier: both harnesses are MCP clients, so fi-core capabilities plug
    into either. Importing the package is dep-free; harness SDKs load lazily
    through the [claude] / [codex] / [api] extras.
  doc_url: https://github.com/BernardUriza/free-intelligence/tree/main/apps/packages/fi-runner
  dev_url: https://github.com/BernardUriza/free-intelligence

extra:
  recipe-maintainers:
    - BernardUriza
