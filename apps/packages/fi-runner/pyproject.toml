[project]
name = "fi-runner"
version = "0.9.0"
description = "Free Intelligence runner framework — a backend-agnostic agent runtime (Claude Code / Codex) over fi-core capabilities."
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Bernard Uriza Orozco" },
]
license = { text = "MIT" }
keywords = ["agent", "runner", "mcp", "claude-code", "codex", "fi-core", "backend-agnostic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
# The port + Runner + capability wiring are zero-dep (only fi-core for the
# capability contracts). Backends pull their harness SDK via the extras below.
dependencies = [
    # Bounded: pre-1.0 minors of fi-core can break; cap at the next unreleased
    # minor so a mid-event fi-core bump can't silently break consumers.
    "fi-core>=0.12,<0.14",
]

[project.optional-dependencies]
# Claude Code backend — the Claude Agent SDK (runs on a Max subscription via
# OAuth; full Claude Code toolset + deep MCP).
claude = [
    "claude-agent-sdk>=0.1,<1.0",
]
# Codex backend — OpenAI Codex headless CLI (`codex exec --json`). It drives the
# `codex` BINARY as a subprocess, so there is NO Python dependency: install the
# CLI separately (`npm i -g @openai/codex`) and sign in (or set a provider key
# for API-motor mode). The extra exists only to document this install path.
codex = []
# Redis-backed conversation continuity (RedisConversationStore) — container-safe
# history replay. Just the async client; the deploy runs the Redis instance.
redis = [
    "redis>=5,<7",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
]

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fi_runner*"]
exclude = ["tests*"]
