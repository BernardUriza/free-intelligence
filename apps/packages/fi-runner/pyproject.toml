[project]
name = "fi-runner"
version = "0.18.0"
description = "Free Intelligence runner framework — a backend-agnostic agent runtime (Claude Code / Codex) over fi-core capabilities."
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Bernard Uriza Orozco" },
]
license = { text = "PolyForm-Noncommercial-1.0.0" }
keywords = ["agent", "runner", "mcp", "claude-code", "codex", "fi-core", "backend-agnostic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
# The port + Runner + capability wiring are zero-dep (only fi-core for the
# capability contracts). Backends pull their harness SDK via the extras below.
dependencies = [
    # Bounded: pre-1.0 minors of fi-core can break; cap at the next unreleased
    # minor so a mid-event fi-core bump can't silently break consumers.
    # Floor 0.24: fi-runner's plan-first stream events depend on the v2
    # task_tracker contract (11 MCP tools — declare/start/complete/fail/cancel
    # step + note + insert + replan + cancel/finalize plan + list_plans).
    # Older fi-core only exposes the v1 4-tool surface, so the runner's
    # `_derive_plan_events` would silently drop step_noted / plan_amended /
    # plan_completed / plan_failed / plan_cancelled events.
    "fi-core>=0.24,<0.25",
]

[project.optional-dependencies]
# Claude Code backend — the Claude Agent SDK (runs on a Max subscription via
# OAuth; full Claude Code toolset + deep MCP).
claude = [
    "claude-agent-sdk>=0.1,<1.0",
]
# Codex backend — OpenAI Codex headless CLI (`codex exec --json`). It drives the
# `codex` BINARY as a subprocess, so there is NO Python dependency: install the
# CLI separately (`npm i -g @openai/codex`) and sign in (or set a provider key
# for API-motor mode). The extra exists only to document this install path.
codex = []
# Redis-backed conversation continuity (RedisConversationStore) — container-safe
# history replay. Just the async client; the deploy runs the Redis instance.
redis = [
    "redis>=5,<7",
]
# Auth layer (fi_runner.auth) — Auth0 RS256/JWKS access-token validation + a
# FastAPI dependency factory. Opt-in: NOT exported from the top-level package, so
# `import fi_runner` works without this extra (other consumers stay unaffected);
# a consumer that wants real auth imports `from fi_runner.auth import ...` and
# installs this. crypto = the RSA backend PyJWT needs for RS256.
auth = [
    "pyjwt[crypto]>=2.8,<3",
    "cryptography>=42",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
]
# CLI shell-out surface (`fi-runner exec ...`). Typer only — the backends still
# pull their own harness SDK lazily. Importing `fi_runner` stays dep-free; only
# running the `fi-runner` console script needs this extra.
cli = [
    "typer>=0.12",
]

[project.scripts]
# The shell-out entrypoint: `pip install 'fi-runner[cli]'` exposes `fi-runner`.
# Any process (shell, Makefile, Java `Runtime.exec`, CI) drives the runner
# without importing Python and without a persistent sidecar.
fi-runner = "fi_runner.cli:main"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["fi_runner*"]
exclude = ["tests*"]

[tool.setuptools.package-data]
"fi_runner" = ["py.typed", "prompts/*.md"]
