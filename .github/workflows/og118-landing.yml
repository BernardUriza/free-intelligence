name: Deploy og118 landing (Azure SWA)

# Static "coming soon" landing for og118.ai, hosted on Azure Static Web Apps.
# Path-filtered: only runs when the landing (or this workflow) changes, so the
# monorepo's other pushes don't trigger a redeploy.

on:
  push:
    branches: [main]
    paths:
      - 'apps/og118-landing/**'
      - '.github/workflows/og118-landing.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'apps/og118-landing/**'
      - '.github/workflows/og118-landing.yml'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_OG118 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Static HTML, no build step.
          app_location: 'apps/og118-landing'
          output_location: ''
          skip_app_build: true

  close_pr_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_OG118 }}
          action: close
