name: Deploy og118 backend (ACR + Container App)

# Builds the og118 FastAPI + fi-runner image (linux/amd64) and deploys it to an
# Azure Container App. Path-filtered to og118 + its Python substrate only —
# AURITY's deploy-azure.yml is untouched and unaffected.
#
# Auth: OIDC federated credentials (NOT the shared AURITY AZURE_CREDENTIALS).
# Image is built amd64 on the (amd64) GitHub runner so it runs on ACA — the
# local arm64 image from Gate 1 is dev-only.
#
# One-time bootstrap (identity, secrets, variables, roles) is documented in
# apps/og118/DEPLOY.md. The resources (ACR, env, app) are created idempotently
# here, so a fresh run reproduces the deploy.

on:
  push:
    branches: [main]
    paths:
      - 'apps/og118/server/**'
      - 'apps/packages/fi-core/**'
      - 'apps/packages/fi-runner/**'
      - '.github/workflows/og118-backend.yml'
  workflow_dispatch:

concurrency:
  group: og118-backend-deploy
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC
  contents: read

env:
  RG: ${{ vars.OG118_RESOURCE_GROUP }}
  LOCATION: ${{ vars.OG118_LOCATION }}
  ACR: ${{ vars.OG118_ACR_NAME }}
  ACA_ENV: ${{ vars.OG118_CONTAINERAPP_ENV }}
  APP: ${{ vars.OG118_API_NAME }}
  IMAGE: og118-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure ACR (idempotent)
        run: |
          az acr show -n "$ACR" -g "$RG" >/dev/null 2>&1 \
            || az acr create -n "$ACR" -g "$RG" -l "$LOCATION" --sku Basic --admin-enabled false

      - name: Build linux/amd64 + push to ACR
        run: |
          az acr login -n "$ACR"
          # BuildKit on the amd64 runner honors apps/og118/server/Dockerfile.dockerignore
          # (scoped) and builds natively — no QEMU, no arm64.
          # SHA-only tag: :latest is mutable and can race across concurrent deploys.
          docker build --platform linux/amd64 \
            -f apps/og118/server/Dockerfile \
            -t "$ACR.azurecr.io/$IMAGE:${{ github.sha }}" .
          docker push "$ACR.azurecr.io/$IMAGE:${{ github.sha }}"

      - name: Ensure Container Apps environment (idempotent)
        run: |
          az containerapp env show -n "$ACA_ENV" -g "$RG" >/dev/null 2>&1 \
            || az containerapp env create -n "$ACA_ENV" -g "$RG" -l "$LOCATION"

      - name: Create or update Container App
        # Secrets/vars come through env: (GitHub masks them and they never enter
        # the run: command interpolation); every az arg is individually quoted so
        # no value is word-split or shell-expanded. ANTHROPIC_API_KEY only (API
        # mode); NO OAuth in cloud.
        env:
          IMG: ${{ vars.OG118_ACR_NAME }}.azurecr.io/og118-server:${{ github.sha }}
          ANTHROPIC_KEY: ${{ secrets.OG118_ANTHROPIC_API_KEY }}
          ACCESS_TOKEN: ${{ secrets.OG118_ACCESS_TOKEN }}
          ALLOWED_ORIGINS: ${{ vars.OG118_ALLOWED_ORIGINS }}
          MODEL: ${{ vars.OG118_MODEL }}
        run: |
          if az containerapp show -n "$APP" -g "$RG" >/dev/null 2>&1; then
            az containerapp secret set -n "$APP" -g "$RG" \
              --secrets "anthropic-key=$ANTHROPIC_KEY" "access-token=$ACCESS_TOKEN"
            az containerapp update -n "$APP" -g "$RG" --image "$IMG" \
              --set-env-vars \
                "ANTHROPIC_API_KEY=secretref:anthropic-key" \
                "OG118_ACCESS_TOKEN=secretref:access-token" \
                "OG118_ALLOWED_ORIGINS=$ALLOWED_ORIGINS" \
                "OG118_MODEL=$MODEL" \
                "HDF5_USE_FILE_LOCKING=FALSE"
          else
            az containerapp create -n "$APP" -g "$RG" --environment "$ACA_ENV" \
              --image "$IMG" \
              --registry-server "$ACR.azurecr.io" --registry-identity system \
              --target-port 8118 --ingress external \
              --min-replicas 1 --max-replicas 1 --cpu 1.0 --memory 2.0Gi \
              --secrets "anthropic-key=$ANTHROPIC_KEY" "access-token=$ACCESS_TOKEN" \
              --env-vars \
                "ANTHROPIC_API_KEY=secretref:anthropic-key" \
                "OG118_ACCESS_TOKEN=secretref:access-token" \
                "OG118_ALLOWED_ORIGINS=$ALLOWED_ORIGINS" \
                "OG118_MODEL=$MODEL" \
                "HDF5_USE_FILE_LOCKING=FALSE"
          fi

      - name: Ensure RAG store persistence volume (idempotent)
        # The Projects RAG corpus persists at /opt/fi/data (Dockerfile sets
        # FI_RAG_STORE_PATH there). On the ephemeral container disk it is wiped on
        # EVERY redeploy, so mount an Azure Files share at that path. Fully
        # idempotent: the storage account + share + env-storage are ensure-or-
        # create, and the app volume MOUNT is applied ONLY when absent — a clean
        # no-op on normal `--image` deploys (which already preserve the mount), so
        # it only acts on first-create / ACA recreate. HDF5_USE_FILE_LOCKING=FALSE
        # (set in the step above) is required: HDF5's lock fights SMB; safe because
        # the app is pinned min=max=1 replica (single writer). The mount uses
        # `update --yaml` with the `configuration.secrets` section STRIPPED —
        # exported secrets are redacted to null and a roundtrip would WIPE them;
        # omission preserves them. This step runs AFTER secrets are set above.
        env:
          SA: og118ragstore
          SHARE: ragstore
        run: |
          az storage account show -n "$SA" -g "$RG" >/dev/null 2>&1 \
            || az storage account create -n "$SA" -g "$RG" -l "$LOCATION" --sku Standard_LRS --kind StorageV2
          KEY=$(az storage account keys list -n "$SA" -g "$RG" --query "[0].value" -o tsv)
          az storage share exists --name "$SHARE" --account-name "$SA" --account-key "$KEY" --query exists -o tsv | grep -qi true \
            || az storage share create --name "$SHARE" --account-name "$SA" --account-key "$KEY" --quota 5
          az containerapp env storage show -n "$ACA_ENV" -g "$RG" --storage-name "$SHARE" >/dev/null 2>&1 \
            || az containerapp env storage set -n "$ACA_ENV" -g "$RG" --storage-name "$SHARE" \
                 --azure-file-account-name "$SA" --azure-file-account-key "$KEY" \
                 --azure-file-share-name "$SHARE" --access-mode ReadWrite
          MOUNTED=$(az containerapp show -n "$APP" -g "$RG" \
            --query "length(properties.template.volumes[?name=='ragstore-vol'])" -o tsv 2>/dev/null || echo 0)
          if [ "${MOUNTED:-0}" = "0" ]; then
            python3 -m pip install --quiet pyyaml
            az containerapp show -n "$APP" -g "$RG" -o yaml > /tmp/aca.yaml
            python3 apps/og118/server/scripts/aca_add_volume.py /tmp/aca.yaml ragstore-vol ragstore /opt/fi/data
            az containerapp update -n "$APP" -g "$RG" --yaml /tmp/aca.yaml
            echo "ragstore-vol mounted at /opt/fi/data"
          else
            echo "ragstore-vol already mounted — no-op"
          fi

      - name: Wire TTS config (only when configured — else no-op)
        # B3-VOICE-BACKEND-1. Additive + idempotent: it does NOT touch the chat
        # env above. `--set-env-vars` MERGES (it never drops the chat vars). When
        # OG118_TTS_* is unset, this is a clean no-op and /tts/synthesize returns
        # 503 by design — the foundation ships gated, not broken. Key is a secret
        # (secretref); endpoint/deployment/version/voice are plain vars.
        env:
          TTS_API_KEY: ${{ secrets.OG118_TTS_API_KEY }}
          TTS_ENDPOINT: ${{ vars.OG118_TTS_ENDPOINT }}
          TTS_DEPLOYMENT: ${{ vars.OG118_TTS_DEPLOYMENT }}
          TTS_API_VERSION: ${{ vars.OG118_TTS_API_VERSION }}
          TTS_VOICE: ${{ vars.OG118_TTS_VOICE }}
        run: |
          if [ -z "$TTS_API_KEY" ] || [ -z "$TTS_ENDPOINT" ] || [ -z "$TTS_DEPLOYMENT" ]; then
            echo "TTS not configured (OG118_TTS_ENDPOINT/API_KEY/DEPLOYMENT unset)."
            echo "Skipping — /tts/synthesize will return 503 until configured."
            exit 0
          fi
          az containerapp secret set -n "$APP" -g "$RG" \
            --secrets "tts-api-key=$TTS_API_KEY"
          az containerapp update -n "$APP" -g "$RG" \
            --set-env-vars \
              "OG118_TTS_API_KEY=secretref:tts-api-key" \
              "OG118_TTS_ENDPOINT=$TTS_ENDPOINT" \
              "OG118_TTS_DEPLOYMENT=$TTS_DEPLOYMENT" \
              "OG118_TTS_API_VERSION=${TTS_API_VERSION:-2025-03-01-preview}" \
              "OG118_TTS_VOICE=${TTS_VOICE:-nova}"

      - name: Wire STT config (only when configured — else no-op)
        # B3-VOICE-STT-CONFIG-1. The STT twin of the TTS step above: same additive,
        # idempotent, merge-only shape so a future backend deploy KEEPS dictation
        # configured (previously the OG118_STT_* vars lived only on the live
        # Container App — drift). When OG118_STT_* is unset this is a clean no-op
        # and /stt/transcribe returns 503 by design. Key is a secret (secretref);
        # endpoint/deployment are plain vars. API version falls back to the code
        # default (2024-06-01) so no var is required for it.
        env:
          STT_API_KEY: ${{ secrets.OG118_STT_API_KEY }}
          STT_ENDPOINT: ${{ vars.OG118_STT_ENDPOINT }}
          STT_DEPLOYMENT: ${{ vars.OG118_STT_DEPLOYMENT }}
          STT_API_VERSION: ${{ vars.OG118_STT_API_VERSION }}
        run: |
          if [ -z "$STT_API_KEY" ] || [ -z "$STT_ENDPOINT" ] || [ -z "$STT_DEPLOYMENT" ]; then
            echo "STT not configured (OG118_STT_ENDPOINT/API_KEY/DEPLOYMENT unset)."
            echo "Skipping — /stt/transcribe will return 503 until configured."
            exit 0
          fi
          az containerapp secret set -n "$APP" -g "$RG" \
            --secrets "og118-stt-api-key=$STT_API_KEY"
          az containerapp update -n "$APP" -g "$RG" \
            --set-env-vars \
              "OG118_STT_API_KEY=secretref:og118-stt-api-key" \
              "OG118_STT_ENDPOINT=$STT_ENDPOINT" \
              "OG118_STT_DEPLOYMENT=$STT_DEPLOYMENT" \
              "OG118_STT_API_VERSION=${STT_API_VERSION:-2024-06-01}"

      - name: Ensure AcrPull for the app's managed identity (idempotent)
        # --registry-identity system wires the pull, but the role assignment can
        # lag on first create. Assign it explicitly (needs Owner on og118-rg, per
        # DEPLOY.md). Idempotent: ignore "already exists".
        run: |
          PID=$(az containerapp show -n "$APP" -g "$RG" --query identity.principalId -o tsv)
          ACR_ID=$(az acr show -n "$ACR" -g "$RG" --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$PID" --assignee-principal-type ServicePrincipal \
            --role AcrPull --scope "$ACR_ID" 2>/dev/null \
            || echo "AcrPull already assigned"

      - name: Health check
        run: |
          FQDN=$(az containerapp show -n "$APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          echo "FQDN: https://$FQDN"
          for i in $(seq 1 12); do
            if curl -sf "https://$FQDN/health" -o /dev/null; then echo "healthy"; exit 0; fi
            echo "waiting for health ($i)…"; sleep 10
          done
          echo "health check failed"; exit 1
