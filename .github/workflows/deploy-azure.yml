name: Deploy to Azure (Container Apps)

# =============================================================================
# AURITY Azure Deployment Pipeline
# =============================================================================
# Backend: Azure Container Apps (serverless containers)
# Frontend: Azure Static Web Apps
# Database: Azure PostgreSQL Flexible Server
# Secrets: Azure Key Vault (via Managed Identity)
# =============================================================================

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend deployment'
        type: boolean
        default: false
      skip_backend:
        description: 'Skip backend deployment'
        type: boolean
        default: false

concurrency:
  group: azure-deploy
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: aurity-prod
  ACR_NAME: aaborozcoacr
  CONTAINER_APP_NAME: ca-aurity-backend
  CONTAINER_ENV_NAME: cae-aurity-prod
  IMAGE_NAME: aurity-backend

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build and Push Docker Image to ACR
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_backend }}
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"

          echo "Building image: $FULL_IMAGE"

          docker build \
            -f docker/Dockerfile.azure \
            -t "$FULL_IMAGE" \
            -t "$LATEST_IMAGE" \
            .

          docker push "$FULL_IMAGE"
          docker push "$LATEST_IMAGE"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image pushed: $FULL_IMAGE"

  # ═══════════════════════════════════════════════════════════════════════════
  # Deploy Backend to Azure Container Apps
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend (Container Apps)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip_backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"

          # Check if container app exists
          EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_ENV_NAME }} \
              --image "$IMAGE" \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --registry-username ${{ env.ACR_NAME }} \
              --registry-password "$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)" \
              --target-port 7001 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --cpu 0.5 \
              --memory 1Gi \
              --env-vars \
                ENVIRONMENT=production \
                DEPLOYMENT_TARGET=cloud \
                AZURE_KEYVAULT_NAME=aurity-secrets \
                PYTHONPATH=/app \
                PYTHONUNBUFFERED=1
          else
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image "$IMAGE"
          fi

      - name: Get Container App URL
        id: get_url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend URL: https://$FQDN"
          echo "backend_url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: |
          echo "Waiting for container to be ready..."
          sleep 30

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Testing health endpoint..."
          for i in 1 2 3 4 5; do
            if curl -sf "https://$FQDN/api/health" -o /dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ═══════════════════════════════════════════════════════════════════════════
  # Deploy Frontend to Azure Static Web Apps
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend (Static Web Apps)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            apps/aurity/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --filter aurity --frozen-lockfile

      - name: Build frontend
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_DEPLOYMENT_TARGET: cloud
          NEXT_PUBLIC_BASE_URL: https://app.aurity.io
          NEXT_PUBLIC_BACKEND_URL: https://ca-aurity-backend.bluewater-34157992.eastus.azurecontainerapps.io
          NEXT_PUBLIC_API_BASE: https://ca-aurity-backend.bluewater-34157992.eastus.azurecontainerapps.io
          NEXT_PUBLIC_API_URL: https://ca-aurity-backend.bluewater-34157992.eastus.azurecontainerapps.io
          NEXT_PUBLIC_SUPERADMIN_EMAILS: ${{ secrets.SUPERADMIN_EMAILS }}
        run: pnpm --filter aurity build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/aurity/out"
          skip_app_build: true
          skip_api_build: true

  # ═══════════════════════════════════════════════════════════════════════════
  # Verify Deployment
  # ═══════════════════════════════════════════════════════════════════════════
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -g pnpm
          pnpm install -w @playwright/test
          npx playwright install chromium

      - name: Run E2E Validation
        env:
          BASE_URL: https://app.aurity.io
          BACKEND_URL: https://api.aurity.io
          CI: true
        run: |
          echo "Running E2E tests..."
          npx playwright test tests/e2e/version-badge.spec.ts --project=chromium || echo "E2E tests failed (non-blocking during migration)"

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo " AURITY Azure Deployment Complete"
          echo "=========================================="
          echo ""
          echo " Frontend: https://app.aurity.io"
          echo " Backend:  https://api.aurity.io"
          echo ""
          echo "=========================================="
