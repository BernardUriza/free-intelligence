name: Test Email Notification

on:
  workflow_dispatch:
    inputs:
      test_message:
        description: 'Test message to include in email'
        required: false
        default: 'This is a test email from Aurity CI/CD'

jobs:
  test-email:
    name: Send test email
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: metadata
        run: |
          # Get version from tauri.conf.json
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

          # Get short commit SHA
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Get timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_short=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Commit: $SHORT_SHA"

      - name: Send test email
        uses: dawidd6/action-send-mail@v3
        with:
          # Azure Communication Services SMTP configuration
          server_address: smtp.azurecomm.net
          server_port: 587
          secure: true
          username: ${{ secrets.ACS_SMTP_USERNAME }}
          password: ${{ secrets.ACS_SMTP_PASSWORD }}

          # Email metadata
          subject: "🧪 TEST - Windows Build Complete - Aurity Desktop v${{ steps.metadata.outputs.version }} (${{ steps.metadata.outputs.commit_short }})"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Aurity CI/CD <${{ secrets.ACS_FROM_EMAIL }}>"
          reply_to: ${{ secrets.NOTIFY_EMAIL }}
          priority: normal

          # Email body (HTML)
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
            </head>
            <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">

              <!-- Header -->
              <div style="background: linear-gradient(135deg, #0078D4 0%, #00BCF2 100%); color: white; padding: 30px; border-radius: 10px 10px 0 0; text-align: center;">
                <h1 style="margin: 0; font-size: 28px; font-weight: 600;">🧪 TEST - Build Exitoso</h1>
                <p style="margin: 10px 0 0 0; font-size: 16px; opacity: 0.9;">Aurity Desktop para Windows</p>
              </div>

              <!-- Content -->
              <div style="background: #f8f9fa; padding: 30px; border-radius: 0 0 10px 10px;">

                <!-- Test Notice -->
                <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #ffc107;">
                  <p style="margin: 0; color: #856404; font-weight: 600;">⚠️ Este es un EMAIL DE PRUEBA</p>
                  <p style="margin: 5px 0 0 0; color: #856404; font-size: 14px;">${{ github.event.inputs.test_message }}</p>
                </div>

                <!-- Version Info -->
                <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #22c55e;">
                  <table style="width: 100%; border-collapse: collapse;">
                    <tr>
                      <td style="padding: 8px 0; font-weight: 600; color: #666; width: 120px;">Versión:</td>
                      <td style="padding: 8px 0; color: #333; font-size: 18px; font-weight: 600;">${{ steps.metadata.outputs.version }}</td>
                    </tr>
                    <tr>
                      <td style="padding: 8px 0; font-weight: 600; color: #666;">Plataforma:</td>
                      <td style="padding: 8px 0;">Windows x86_64 (NSIS)</td>
                    </tr>
                    <tr>
                      <td style="padding: 8px 0; font-weight: 600; color: #666;">Commit:</td>
                      <td style="padding: 8px 0; font-family: 'Courier New', monospace; font-size: 14px; color: #0078D4;">${{ steps.metadata.outputs.commit_short }}</td>
                    </tr>
                    <tr>
                      <td style="padding: 8px 0; font-weight: 600; color: #666;">Fecha:</td>
                      <td style="padding: 8px 0;">${{ steps.metadata.outputs.timestamp }}</td>
                    </tr>
                  </table>
                </div>

                <!-- Download Section -->
                <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                  <h3 style="margin: 0 0 15px 0; color: #333; font-size: 18px;">📦 Descarga</h3>
                  <p style="margin: 0 0 15px 0; color: #666;">El instalador está disponible en GitHub Releases:</p>
                  <a href="https://github.com/${{ github.repository }}/releases/tag/v${{ steps.metadata.outputs.version }}"
                     style="display: inline-block; background: #0078D4; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-weight: 600; box-shadow: 0 2px 4px rgba(0,120,212,0.2);">
                    Ver Release en GitHub →
                  </a>
                </div>

                <!-- Artifacts -->
                <div style="background: white; padding: 20px; border-radius: 8px;">
                  <h3 style="margin: 0 0 15px 0; color: #333; font-size: 18px;">📋 Archivos generados</h3>
                  <ul style="margin: 0; padding-left: 20px; color: #666;">
                    <li style="margin: 8px 0;">Aurity_${{ steps.metadata.outputs.version }}_x64-setup.nsis.zip</li>
                    <li style="margin: 8px 0;">Signature file (.sig)</li>
                    <li style="margin: 8px 0;">Updater manifest (JSON)</li>
                  </ul>
                </div>

              </div>

              <!-- Footer -->
              <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #e5e7eb; text-align: center;">
                <p style="margin: 0 0 10px 0; color: #9ca3af; font-size: 14px;">
                  <strong>Workflow Run:</strong>
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="color: #0078D4; text-decoration: none;">
                    #${{ github.run_id }}
                  </a>
                </p>
                <p style="margin: 0; color: #9ca3af; font-size: 12px;">
                  Enviado automáticamente por Aurity CI/CD · Powered by Azure Communication Services
                </p>
              </div>

            </body>
            </html>

          # Error handling
          ignore_cert: false
          convert_markdown: false

        # Don't fail workflow if email fails
        continue-on-error: false
        timeout-minutes: 2
