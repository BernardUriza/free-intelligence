name: Build Aurity Desktop

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (linux, macos, windows, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - linux
          - macos
          - windows
          - all

jobs:
  build-fi-monitor:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            apps/fi-monitor/src-tauri/target
            apps/aurity-desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apps/**/src-tauri/src/**/*.rs') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-${{ runner.os }}-

      - name: Install dependencies
        working-directory: apps/fi-monitor
        run: pnpm install

      - name: Build FI Monitor
        working-directory: apps/fi-monitor
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Get artifact paths
        id: paths
        shell: pwsh
        run: |
          $INFO = node apps/aurity-desktop/scripts/get-artifact-path.js fi-monitor x86_64-pc-windows-msvc nsis | ConvertFrom-Json
          "path=$($INFO.path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sig=$($INFO.sig)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "file=$($INFO.file)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign NSIS installer
        working-directory: apps/fi-monitor
        shell: pwsh
        run: |
          echo "" | pnpm tauri signer sign "${{ steps.paths.outputs.path }}" --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: fi-monitor-windows-nsis
          path: apps/fi-monitor/${{ steps.paths.outputs.path }}

      - name: Upload NSIS signature
        uses: actions/upload-artifact@v4
        with:
          name: fi-monitor-windows-nsis-sig
          path: apps/fi-monitor/${{ steps.paths.outputs.sig }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.paths.outputs.version }}
          name: Release v${{ steps.paths.outputs.version }}
          body: |
            ## Aurity Desktop v${{ steps.paths.outputs.version }}

            ### Downloads
            - Windows: ${{ steps.paths.outputs.file }}

            ---
            🤖 Auto-generated release
          files: |
            apps/fi-monitor/${{ steps.paths.outputs.path }}
            apps/fi-monitor/${{ steps.paths.outputs.sig }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    if: |
      github.event.inputs.platform == 'linux' ||
      github.event.inputs.platform == 'macos' ||
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Create .env.production
        working-directory: apps/aurity
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_SUPERADMIN_EMAILS=${{ secrets.SUPERADMIN_EMAILS }}
          NEXT_PUBLIC_DEPLOYMENT_TARGET=desktop
          NEXT_PUBLIC_BACKEND_URL=http://localhost:7001
          EOF

      - name: Build Next.js frontend
        working-directory: apps/aurity
        run: |
          pnpm install
          pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/
          retention-days: 1

  build-linux:
    if: |
      (github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all') &&
      (needs.build-fi-monitor.result == 'success' || needs.build-fi-monitor.result == 'skipped')
    needs: [build-fi-monitor, build-frontend]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            apps/fi-monitor/src-tauri/target
            apps/aurity-desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apps/**/src-tauri/src/**/*.rs') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsqlite3-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Build backend with PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pyinstaller aurity-backend.spec

      - name: Copy backend binary
        run: |
          mkdir -p apps/aurity-desktop/src-tauri/binaries
          cp apps/aurity-desktop/pyinstaller/dist/aurity-backend-x86_64-unknown-linux-gnu \
             apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu
          chmod +x apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Sign AppImage
        working-directory: apps/aurity-desktop
        run: |
          pnpm tauri signer sign \
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage \
            --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-linux-appimage
          path: apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload AppImage signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-linux-appimage-sig
          path: apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          retention-days: 7

      - name: Create GitHub Release (Linux)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          name: Release v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          body: |
            ## Aurity Desktop v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

            ### Downloads
            - Linux: AppImage

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: |
      (github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all') &&
      (needs.build-fi-monitor.result == 'success' || needs.build-fi-monitor.result == 'skipped')
    needs: [build-fi-monitor, build-frontend]
    runs-on: macos-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            apps/fi-monitor/src-tauri/target
            apps/aurity-desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apps/**/src-tauri/src/**/*.rs') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Build backend with PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pyinstaller aurity-backend.spec

      - name: Copy backend binary
        run: |
          mkdir -p apps/aurity-desktop/src-tauri/binaries
          cp apps/aurity-desktop/pyinstaller/dist/aurity-backend-aarch64-apple-darwin \
             apps/aurity-desktop/src-tauri/binaries/aurity-backend-aarch64-apple-darwin
          chmod +x apps/aurity-desktop/src-tauri/binaries/aurity-backend-aarch64-apple-darwin

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Sign DMG
        working-directory: apps/aurity-desktop
        run: |
          pnpm tauri signer sign \
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-macos-dmg
          path: apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

      - name: Upload DMG signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-macos-dmg-sig
          path: apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
          retention-days: 7

      - name: Create GitHub Release (macOS)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          name: Release v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          body: |
            ## Aurity Desktop v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

            ### Downloads
            - macOS: DMG (Apple Silicon)

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    if: |
      (github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all') &&
      (needs.build-fi-monitor.result == 'success' || needs.build-fi-monitor.result == 'skipped')
    needs: [build-fi-monitor, build-frontend]
    runs-on: windows-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Set dynamic version
        shell: pwsh
        run: |
          $commitHash = git rev-parse --short HEAD
          $version = "0.0.0-$commitHash"
          node apps/aurity-desktop/scripts/set-version.js $version
          Write-Host "✅ Version set to: $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            apps/fi-monitor/src-tauri/target
            apps/aurity-desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apps/**/src-tauri/src/**/*.rs') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Build backend with PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pyinstaller aurity-backend.spec

      - name: Copy backend binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/aurity-desktop/src-tauri/binaries
          Copy-Item apps/aurity-desktop/pyinstaller/dist/aurity-backend-x86_64-pc-windows-msvc.exe `
                    apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-pc-windows-msvc.exe

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Verify Windows build outputs
        shell: pwsh
        working-directory: apps/aurity-desktop
        run: |
          $bundlePath = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"

          if (-not (Test-Path $bundlePath)) {
            Write-Error "❌ Bundle directory not found: $bundlePath"
            exit 1
          }

          $nsisZip = Get-ChildItem "$bundlePath/*.nsis.zip" -ErrorAction SilentlyContinue
          if (-not $nsisZip) {
            Write-Error "❌ NSIS zip not found in $bundlePath"
            Write-Host "Contents of bundle directory:"
            Get-ChildItem $bundlePath -Recurse | Format-Table Name, Length
            exit 1
          }

          Write-Host "✅ Build outputs verified:"
          Get-ChildItem $bundlePath -Recurse | ForEach-Object {
            $sizeMB = [math]::Round($_.Length/1MB, 2)
            Write-Host "  - $($_.Name) ($sizeMB MB)"
          }

      - name: Sign NSIS installer
        shell: pwsh
        working-directory: apps/aurity-desktop
        env:
          TAURI_PRIVATE_KEY_PASSWORD: ""
        run: |
          $nsisPath = Get-ChildItem -Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip | Select-Object -First 1

          if (-not $nsisPath) {
            Write-Error "❌ NSIS bundle not found for signing"
            exit 1
          }

          Write-Host "✅ Found NSIS bundle: $($nsisPath.FullName)"

          pnpm tauri signer sign $nsisPath.FullName --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

          if (-not (Test-Path "$($nsisPath.FullName).sig")) {
            Write-Error "❌ Signature file not generated"
            exit 1
          }

          Write-Host "✅ Signature created: $($nsisPath.FullName).sig"

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-windows-nsis
          path: apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
          retention-days: 7

      - name: Upload NSIS signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-windows-nsis-sig
          path: apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 7

      - name: Create GitHub Release (Windows)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          name: Release v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          body: |
            ## Aurity Desktop v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

            ### Downloads
            - Windows: NSIS installer

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-manifest:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate updater manifest
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create manifest base
          cat > aurity-desktop-updater.json << EOF
          {
            "version": "$VERSION",
            "notes": "See changelog at https://github.com/BernardUriza/free-intelligence/releases/tag/v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {}
          }
          EOF

          # Add macOS if signature exists
          if [ -f artifacts/aurity-macos-dmg-sig/*.dmg.sig ]; then
            echo "✅ Found macOS signature"
            DMG_SIG=$(cat artifacts/aurity-macos-dmg-sig/*.dmg.sig)
            jq --arg sig "$DMG_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_aarch64.dmg" \
               '.platforms["darwin-aarch64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping macOS (no signature found)"
          fi

          # Add Linux if signature exists
          if [ -f artifacts/aurity-linux-appimage-sig/*.AppImage.sig ]; then
            echo "✅ Found Linux signature"
            APPIMAGE_SIG=$(cat artifacts/aurity-linux-appimage-sig/*.AppImage.sig)
            jq --arg sig "$APPIMAGE_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_amd64.AppImage" \
               '.platforms["linux-x86_64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping Linux (no signature found)"
          fi

          # Add Windows if signature exists
          if [ -f artifacts/aurity-windows-nsis-sig/*.nsis.zip.sig ]; then
            echo "✅ Found Windows signature"
            NSIS_SIG=$(cat artifacts/aurity-windows-nsis-sig/*.nsis.zip.sig)
            jq --arg sig "$NSIS_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_x64-setup.nsis.zip" \
               '.platforms["windows-x86_64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping Windows (no signature found)"
          fi

          # Display final manifest
          echo "📄 Final manifest:"
          cat aurity-desktop-updater.json | jq '.'

      - name: Upload manifest to release
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          gh release upload v$VERSION aurity-desktop-updater.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
