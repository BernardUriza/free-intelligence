          # Error handling
          ignore_cert: false
          convert_markdown: false

        # REMOVED continue-on-error - want to see email failures
        timeout-minutes: 2

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-windows-nsis
          path: apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload NSIS signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-windows-nsis-sig
          path: apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          retention-days: 7

      - name: Create or Update GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.metadata.outputs.version }}
          name: Aurity Desktop v${{ steps.metadata.outputs.version }}
          body: |
            ## Aurity Desktop v${{ steps.metadata.outputs.version }}

            **Build:** #${{ github.run_id }}
            **Commit:** ${{ steps.metadata.outputs.commit_short }}
            **Fecha:** ${{ steps.metadata.outputs.timestamp }}

            ### 📦 Descargas

            | Plataforma | Arquitectura | Archivo |
            |------------|--------------|---------|
            | Windows | x86_64 | `Aurity_${{ steps.metadata.outputs.version }}_x64-setup.exe` |

            ### 🔐 Verificación

            Todos los instaladores están firmados con Ed25519. Para verificar:
            ```bash
            # Descargar .exe y .sig
            tauri signer verify <archivo.exe> --public-key <tu-public-key>
            ```

            ### 📋 Requisitos

            - **Windows:** 10/11 (x86_64)
            - **RAM:** 4GB mínimo
            - **Licencia:** Válida de Aurity

            ---
            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: |
            apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-manifest:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate updater manifest
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create manifest base
          cat > aurity-desktop-updater.json << EOF
          {
            "version": "$VERSION",
            "notes": "See changelog at https://github.com/BernardUriza/free-intelligence/releases/tag/v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {}
          }
          EOF

          # Add macOS if signature exists
          if [ -f artifacts/aurity-macos-dmg-sig/*.dmg.sig ]; then
            echo "✅ Found macOS signature"
            DMG_SIG=$(cat artifacts/aurity-macos-dmg-sig/*.dmg.sig)
            jq --arg sig "$DMG_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_aarch64.dmg" \
               '.platforms["darwin-aarch64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping macOS (no signature found)"
          fi

          # Add Linux if signature exists
          if [ -f artifacts/aurity-linux-appimage-sig/*.AppImage.sig ]; then
            echo "✅ Found Linux signature"
            APPIMAGE_SIG=$(cat artifacts/aurity-linux-appimage-sig/*.AppImage.sig)
            jq --arg sig "$APPIMAGE_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_amd64.AppImage" \
               '.platforms["linux-x86_64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping Linux (no signature found)"
          fi

          # Add Windows if signature exists
          if [ -f artifacts/aurity-windows-nsis-sig/*.nsis.zip.sig ]; then
            echo "✅ Found Windows signature"
            NSIS_SIG=$(cat artifacts/aurity-windows-nsis-sig/*.nsis.zip.sig)
            jq --arg sig "$NSIS_SIG" \
               --arg url "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_x64-setup.nsis.zip" \
               '.platforms["windows-x86_64"] = {signature: $sig, url: $url}' \
               aurity-desktop-updater.json > tmp.json && mv tmp.json aurity-desktop-updater.json
          else
            echo "⏭️  Skipping Windows (no signature found)"
          fi

          # Display final manifest
          echo "📄 Final manifest:"
          cat aurity-desktop-updater.json | jq '.'

      - name: Upload manifest to release
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          gh release upload v$VERSION aurity-desktop-updater.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
