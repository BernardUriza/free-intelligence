name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - macos
          - windows
          - all

env:
  AZURE_STORAGE_ACCOUNT: aurityreleases
  AZURE_CONTAINER: releases

jobs:
  build-linux:
    if: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements-prod.txt

      - name: Build Python backend sidecar
        run: |
          cd apps/aurity-desktop/pyinstaller
          pyinstaller aurity-backend.spec
          # Move to binaries folder with correct target triple name
          mkdir -p ../src-tauri/binaries
          mv dist/aurity-backend ../src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu
          ls -la ../src-tauri/binaries/

      - name: Install frontend dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target x86_64-unknown-linux-gnu
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_SUPERADMIN_EMAILS: ${{ secrets.SUPERADMIN_EMAILS }}

      - name: List build artifacts
        run: |
          ls -la apps/aurity-desktop/src-tauri/target/release/bundle/appimage/ || true
          ls -la apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/ || true

      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --destination ${{ env.AZURE_CONTAINER }} \
              --source apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/ \
              --pattern "*.AppImage" \
              --overwrite \
              --auth-mode key \
              --account-key ${{ secrets.AZURE_STORAGE_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-linux-appimage
          path: apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Get version from tauri.conf.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Aurity Desktop v${{ steps.get_version.outputs.version }}
          body: |
            ## Aurity Desktop v${{ steps.get_version.outputs.version }}

            ### Downloads
            - **macOS**: Universal (Intel + Apple Silicon)
            - **Linux**: x86_64 AppImage

            ### Requirements
            - macOS: 12.0+ (Monterey or later)
            - Linux: Ubuntu 22.04+ or equivalent
            - 4GB RAM minimum

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.dmg
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.AppImage
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate updater manifest
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find signature files (platform-specific paths)
          if [ -f apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sig ]; then
            DMG_SIG=$(cat apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sig)
          fi

          if [ -f apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig ]; then
            APPIMAGE_SIG=$(cat apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig)
          fi

          # Create updater.json
          cat > aurity-desktop-updater.json << EOF
          {
            "version": "$VERSION",
            "notes": "See changelog at https://github.com/BernardUriza/free-intelligence/releases/tag/v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$DMG_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_universal.dmg"
              },
              "darwin-x86_64": {
                "signature": "$DMG_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_universal.dmg"
              },
              "linux-x86_64": {
                "signature": "$APPIMAGE_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_amd64.AppImage"
              }
            }
          }
          EOF

          # Upload to release
          gh release upload v$VERSION aurity-desktop-updater.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: ${{ github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements-prod.txt

      - name: Build Python backend sidecar (both architectures)
        run: |
          cd apps/aurity-desktop/pyinstaller
          # Build for current architecture
          pyinstaller aurity-backend.spec
          # Move to binaries folder with target triple names
          mkdir -p ../src-tauri/binaries
          # For universal binary, we need both architectures
          # PyInstaller on macOS builds for current architecture
          # Copy to both target triples (Tauri will use the appropriate one)
          cp dist/aurity-backend ../src-tauri/binaries/aurity-backend-aarch64-apple-darwin
          cp dist/aurity-backend ../src-tauri/binaries/aurity-backend-x86_64-apple-darwin
          chmod +x ../src-tauri/binaries/*
          ls -la ../src-tauri/binaries/

      - name: Install frontend dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Universal)
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_SUPERADMIN_EMAILS: ${{ secrets.SUPERADMIN_EMAILS }}

      - name: Upload to Azure Blob Storage
        run: |
          brew install azure-cli
          az storage blob upload-batch \
            --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
            --destination ${{ env.AZURE_CONTAINER }} \
            --source apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/ \
            --pattern "*.dmg" \
            --overwrite \
            --auth-mode key \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-macos-dmg
          path: apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Get version from tauri.conf.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Aurity Desktop v${{ steps.get_version.outputs.version }}
          body: |
            ## Aurity Desktop v${{ steps.get_version.outputs.version }}

            ### Downloads
            - **macOS**: Universal (Intel + Apple Silicon)
            - **Linux**: x86_64 AppImage

            ### Requirements
            - macOS: 12.0+ (Monterey or later)
            - Linux: Ubuntu 22.04+ or equivalent
            - 4GB RAM minimum

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.dmg
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.AppImage
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate updater manifest
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find signature files (platform-specific paths)
          if [ -f apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sig ]; then
            DMG_SIG=$(cat apps/aurity-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sig)
          fi

          if [ -f apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig ]; then
            APPIMAGE_SIG=$(cat apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig)
          fi

          # Create updater.json
          cat > aurity-desktop-updater.json << EOF
          {
            "version": "$VERSION",
            "notes": "See changelog at https://github.com/BernardUriza/free-intelligence/releases/tag/v$VERSION",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$DMG_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_universal.dmg"
              },
              "darwin-x86_64": {
                "signature": "$DMG_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_universal.dmg"
              },
              "linux-x86_64": {
                "signature": "$APPIMAGE_SIG",
                "url": "https://github.com/BernardUriza/free-intelligence/releases/download/v$VERSION/Aurity_${VERSION}_amd64.AppImage"
              }
            }
          }
          EOF

          # Upload to release
          gh release upload v$VERSION aurity-desktop-updater.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
