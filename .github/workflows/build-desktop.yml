name: Build Aurity Desktop

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (linux, macos, windows, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - linux
          - macos
          - windows
          - all

concurrency:
  group: build-desktop-${{ github.ref }}-${{ github.event.inputs.platform }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fi_monitor: ${{ steps.changes.outputs.fi_monitor }}
      aurity_desktop: ${{ steps.changes.outputs.aurity_desktop }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need 2 commits to diff

      - name: Detect what changed
        id: changes
        run: |
          # Get changed files in last commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "all")

          # Check FI Monitor changes
          if echo "$CHANGED_FILES" | grep -q "apps/fi-monitor/"; then
            echo "fi_monitor=true" >> $GITHUB_OUTPUT
            echo "✅ FI Monitor changed"
          else
            echo "fi_monitor=false" >> $GITHUB_OUTPUT
            echo "⏩ FI Monitor unchanged"
          fi

          # Check Aurity Desktop changes (includes backend)
          if echo "$CHANGED_FILES" | grep -qE "apps/aurity-desktop/|backend/"; then
            echo "aurity_desktop=true" >> $GITHUB_OUTPUT
            echo "✅ Aurity Desktop changed"
          else
            echo "aurity_desktop=false" >> $GITHUB_OUTPUT
            echo "⏩ Aurity Desktop unchanged"
          fi

          # Check Frontend changes
          if echo "$CHANGED_FILES" | grep -q "apps/aurity/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend changed"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
            echo "⏩ Frontend unchanged"
          fi

          # If workflow_dispatch or can't detect changes, build everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$CHANGED_FILES" = "all" ]; then
            echo "fi_monitor=true" >> $GITHUB_OUTPUT
            echo "aurity_desktop=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "🔄 Manual trigger - building everything"
          fi

  build-fi-monitor:
    needs: [detect-changes]
    if: |
      (github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all') &&
      needs.detect-changes.outputs.fi_monitor == 'true'
    runs-on: windows-latest
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: "1"
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          rust-target: x86_64-pc-windows-msvc

      - name: Pre-build Validation (Rust)
        if: false  # DISABLED: for faster builds - validation happens during actual build
        working-directory: apps/fi-monitor/src-tauri
        shell: bash
        run: |
          echo "::group::Cargo Check (fast syntax + type validation)"
          cargo check --release
          echo "::endgroup::"

          echo "Note: Skipping cargo fmt and clippy for faster builds"
          echo "Run locally: cargo fmt --check && cargo clippy --all-targets"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Install dependencies
        working-directory: apps/fi-monitor
        run: pnpm install

      - name: Build FI Monitor
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            cd apps/fi-monitor
            pnpm tauri build --target x86_64-pc-windows-msvc
          shell: bash

      - name: Smoke Test (Binary Validation)
        working-directory: apps/fi-monitor/src-tauri/target/x86_64-pc-windows-msvc/release
        shell: pwsh
        run: |
          echo "::group::Binary Exists Check"
          if (-Not (Test-Path "fi-monitor.exe")) {
            throw "fi-monitor.exe not found after build"
          }
          echo "✅ Binary exists"
          echo "::endgroup::"

          echo "::group::Binary Size Check"
          $size = (Get-Item "fi-monitor.exe").Length / 1MB
          echo "Binary size: $([Math]::Round($size, 2)) MB"
          if ($size -gt 100) {
            echo "⚠️ Warning: Binary > 100MB (expected 30-50MB)"
          }
          echo "::endgroup::"

      - name: Get artifact paths
        id: paths
        shell: pwsh
        run: |
          $INFO = node apps/aurity-desktop/scripts/get-artifact-path.js fi-monitor x86_64-pc-windows-msvc nsis | ConvertFrom-Json
          "path=$($INFO.path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sig=$($INFO.sig)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "file=$($INFO.file)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign NSIS installer
        timeout-minutes: 2
        continue-on-error: true
        working-directory: apps/fi-monitor
        shell: pwsh
        run: |
          pnpm tauri signer sign "${{ steps.paths.outputs.path }}" --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: fi-monitor-windows-nsis
          path: apps/fi-monitor/${{ steps.paths.outputs.path }}

      - name: Upload NSIS signature
        uses: actions/upload-artifact@v4
        with:
          name: fi-monitor-windows-nsis-sig
          path: apps/fi-monitor/${{ steps.paths.outputs.sig }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.paths.outputs.version }}
          name: Release v${{ steps.paths.outputs.version }}
          body: |
            ## Aurity Desktop v${{ steps.paths.outputs.version }}

            ### Downloads
            - Windows: ${{ steps.paths.outputs.file }}

            ---
            🤖 Auto-generated release
          files: |
            apps/fi-monitor/${{ steps.paths.outputs.path }}
            apps/fi-monitor/${{ steps.paths.outputs.sig }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    needs: [detect-changes]
    if: |
      (github.event.inputs.platform == 'linux' ||
       github.event.inputs.platform == 'macos' ||
       github.event.inputs.platform == 'windows' ||
       github.event.inputs.platform == 'all') &&
      needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      - name: Setup frontend build environment
        uses: ./.github/actions/setup-frontend

      - name: Create .env.production
        working-directory: apps/aurity
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_SUPERADMIN_EMAILS=${{ secrets.SUPERADMIN_EMAILS }}
          NEXT_PUBLIC_DEPLOYMENT_TARGET=desktop
          NEXT_PUBLIC_BACKEND_URL=http://localhost:7001
          EOF

      - name: Build Next.js frontend
        working-directory: apps/aurity
        run: |
          pnpm install
          pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/
          retention-days: 1

  build-linux:
    if: false  # DISABLED - Solo buildear Windows para testing
    # if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'
    needs: [build-frontend]
    runs-on: ubuntu-22.04
    env:
      CARGO_INCREMENTAL: "1"
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          rust-target: x86_64-unknown-linux-gnu

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsqlite3-dev

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            apps/aurity-desktop/pyinstaller/dist
            apps/aurity-desktop/pyinstaller/build
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('backend/src/**/*.py', 'backend/requirements-prod.txt', 'apps/aurity-desktop/pyinstaller/*.spec') }}
          restore-keys: |
            pyinstaller-${{ runner.os }}-

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-prod.txt

      - name: Build backend with PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pyinstaller aurity-backend.spec

      - name: Copy backend binary
        run: |
          mkdir -p apps/aurity-desktop/src-tauri/binaries
          cp apps/aurity-desktop/pyinstaller/dist/aurity-backend-x86_64-unknown-linux-gnu \
             apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu
          chmod +x apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-unknown-linux-gnu

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Sign AppImage
        working-directory: apps/aurity-desktop
        run: |
          pnpm tauri signer sign \
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage \
            --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-linux-appimage
          path: apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload AppImage signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-linux-appimage-sig
          path: apps/aurity-desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          name: Release v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          body: |
            ## Aurity Desktop v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

            ### Downloads
            - Linux: AppImage

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.dmg
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.AppImage
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.nsis.zip
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: false  # DISABLED - Solo buildear Windows para testing
    # if: github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all'
    needs: [build-frontend]
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: "1"
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          rust-target: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            apps/aurity-desktop/pyinstaller/dist
            apps/aurity-desktop/pyinstaller/build
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('backend/src/**/*.py', 'backend/requirements-prod.txt', 'apps/aurity-desktop/pyinstaller/*.spec') }}
          restore-keys: |
            pyinstaller-${{ runner.os }}-

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-prod.txt

      - name: Build backend with PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pyinstaller aurity-backend.spec

      - name: Copy backend binary
        run: |
          mkdir -p apps/aurity-desktop/src-tauri/binaries
          cp apps/aurity-desktop/pyinstaller/dist/aurity-backend-aarch64-apple-darwin \
             apps/aurity-desktop/src-tauri/binaries/aurity-backend-aarch64-apple-darwin
          chmod +x apps/aurity-desktop/src-tauri/binaries/aurity-backend-aarch64-apple-darwin

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/aurity-desktop
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Sign DMG
        working-directory: apps/aurity-desktop
        run: |
          pnpm tauri signer sign \
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-macos-dmg
          path: apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

      - name: Upload DMG signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurity-macos-dmg-sig
          path: apps/aurity-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          name: Release v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")
          body: |
            ## Aurity Desktop v$(node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version")

            ### Downloads
            - macOS: DMG (Apple Silicon)

            ---
            🤖 Auto-generated release
          files: |
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.dmg
            apps/aurity-desktop/src-tauri/target/*/release/bundle/**/*.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: [detect-changes, build-frontend]
    if: |
      (github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all') &&
      needs.detect-changes.outputs.aurity_desktop == 'true' &&
      !cancelled()
    runs-on: windows-latest
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: "1"
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: apps/aurity/out/

      - name: Setup Tauri build environment
        uses: ./.github/actions/setup-tauri
        with:
          rust-target: x86_64-pc-windows-msvc

      - name: Pre-build Validation (Rust)
        if: false  # DISABLED: runs before PyInstaller, causing "binary doesn't exist" error
        working-directory: apps/aurity-desktop/src-tauri
        shell: bash
        run: |
          echo "::group::Cargo Check (fast syntax + type validation)"
          cargo check --release
          echo "::endgroup::"

          echo "Note: Skipping cargo fmt and clippy for faster builds"
          echo "Run locally: cargo fmt --check && cargo clippy --all-targets"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            apps/aurity-desktop/pyinstaller/dist
            apps/aurity-desktop/pyinstaller/build
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('backend/src/**/*.py', 'backend/requirements-prod.txt', 'apps/aurity-desktop/pyinstaller/*.spec') }}
          restore-keys: |
            pyinstaller-${{ runner.os }}-

      - name: Install PyInstaller
        working-directory: apps/aurity-desktop/pyinstaller
        run: |
          pip install -r requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-prod.txt

      - name: Build backend with PyInstaller
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            cd apps/aurity-desktop/pyinstaller
            pyinstaller aurity-backend.spec
          shell: bash

      - name: Copy backend binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/aurity-desktop/src-tauri/binaries
          Copy-Item apps/aurity-desktop/pyinstaller/dist/aurity-backend-x86_64-pc-windows-msvc.exe `
                    apps/aurity-desktop/src-tauri/binaries/aurity-backend-x86_64-pc-windows-msvc.exe

      - name: Install Tauri dependencies
        working-directory: apps/aurity-desktop
        run: pnpm install

      - name: Extract build metadata
        id: metadata
        shell: pwsh
        run: |
          # Extract version from tauri.conf.json
          $VERSION = node -p "require('./apps/aurity-desktop/src-tauri/tauri.conf.json').version"

          # Get short commit SHA
          $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)

          # Get timestamp
          $TIMESTAMP = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"

          # Write to GitHub output
          "version=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "commit_short=$SHORT_SHA" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "timestamp=$TIMESTAMP" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "Version: $VERSION"
          Write-Host "Commit: $SHORT_SHA"

      - name: Cache Python 3.14 installer
        uses: actions/cache@v4
        with:
          path: apps/aurity-desktop/resources/python-installer/python-3.14.0-amd64.exe
          key: python-installer-3.14.0-amd64

      - name: Prepare Python 3.14 Installer
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            cd apps/aurity-desktop
            bash scripts/prepare-python-full.sh
          shell: bash
        env:
          PYTHON_VERSION: "3.14.0"

      - name: Verify Python Resources
        shell: bash
        run: |
          ls -lh apps/aurity-desktop/resources/python-installer/
          echo "Python installer size:"
          du -h apps/aurity-desktop/resources/python-installer/python-3.14.0-amd64.exe

      - name: Build Tauri app
        id: build_tauri
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            cd apps/aurity-desktop
            pnpm tauri build --target x86_64-pc-windows-msvc
          shell: bash

      - name: Smoke Test (Binary Validation)
        working-directory: apps/aurity-desktop/src-tauri/target/x86_64-pc-windows-msvc/release
        shell: pwsh
        run: |
          echo "::group::Binary Exists Check"
          if (-Not (Test-Path "aurity-desktop.exe")) {
            throw "aurity-desktop.exe not found after build"
          }
          echo "✅ Binary exists"
          echo "::endgroup::"

          echo "::group::Binary Size Check"
          $size = (Get-Item "aurity-desktop.exe").Length / 1MB
          echo "Binary size: $([Math]::Round($size, 2)) MB"
          if ($size -gt 100) {
            echo "⚠️ Warning: Binary > 100MB (expected 30-50MB)"
          }
          echo "::endgroup::"

      - name: Sign NSIS installer
        timeout-minutes: 2
        continue-on-error: true
        working-directory: apps/aurity-desktop
        run: |
          pnpm tauri signer sign `
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip `
            --private-key "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

      - name: Send build success email notification
        if: always() && steps.build_tauri.conclusion == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          # Azure Communication Services SMTP configuration
          server_address: smtp.azurecomm.net
          server_port: 587
          secure: false  # STARTTLS mode for port 587 (equally secure, different handshake)
          username: ${{ secrets.ACS_SMTP_USERNAME }}
          password: ${{ secrets.ACS_SMTP_PASSWORD }}

          # Email metadata
          subject: "✅ Windows Build Complete - Aurity Desktop v${{ steps.metadata.outputs.version }} (${{ steps.metadata.outputs.commit_short }})"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Aurity CI/CD <${{ secrets.ACS_FROM_EMAIL }}>"
          reply_to: ${{ secrets.NOTIFY_EMAIL }}
          priority: normal

          # Email body (HTML)
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
            </head>
            <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">

              <!-- Header -->
              <div style="background: linear-gradient(135deg, #0078D4 0%, #00BCF2 100%); color: white; padding: 30px; border-radius: 10px 10px 0 0; text-align: center;">
                <h1 style="margin: 0; font-size: 28px; font-weight: 600;">✅ Build Exitoso</h1>
