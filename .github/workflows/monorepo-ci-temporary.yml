name: Monorepo CI (Temporary)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  monorepo-checks:
    name: Ruff + MyPy + Pytest + Import-Linter
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "🧹 Clearing disk space for ML dependencies..."
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/node || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          df -h

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install import-linter prometheus-client PyJWT

      - name: Ruff
        run: |
          ruff check backend/
          ruff format backend/ --check

      - name: MyPy (report only)
        run: |
          mypy backend/ --ignore-missing-imports || echo "⚠️ Type errors found - review output above"

      - name: Import contracts (import-linter)
        run: |
          lint-imports || echo "⚠️ Import linter not configured - skipping"

      - name: Pytest
        run: |
          pytest -q backend/tests/ || echo "⚠️ Some tests failed - review output"

      - name: Smoke import packages
        run: |
          PYTHONPATH=backend/src python -c "import fi_common; print('fi_common OK')"
