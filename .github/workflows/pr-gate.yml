name: ✅ PR Gate (Must Pass)

# Modular AI Gatekeeper with specialized reviewers
# Architecture: Reusable workflows (best practice 2026)
# Source: https://wellarchitected.github.com/library/collaboration/recommendations/scaling-actions-reusability/

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write  # Required for AI gatekeepers to comment on PRs

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # STEP 1: Backend Validation (Reusable Workflow)
  # ============================================================
  backend-validation:
    name: "Backend: Syntax & Imports"
    uses: ./.github/workflows/backend-validation.yml
    with:
      python-version: "3.11"

  # ============================================================
  # STEP 2: Lint Report (Non-blocking)
  # ============================================================
  lint-report:
    name: "Lint: Report"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (report only)
        run: |
          echo "## Lint Report" >> $GITHUB_STEP_SUMMARY
          ruff check backend/src --output-format=github || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 Lint issues do not block merge" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 3: AI Security Gate (Reusable Workflow)
  # ============================================================
  ai-security-gate:
    name: "🔒 Security Review (AI)"
    if: github.event_name == 'pull_request'
    needs: [backend-validation]
    uses: ./.github/workflows/ai-security-gate.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
      backend-status: ${{ needs.backend-validation.outputs.status }}
    secrets:
      azure-endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      azure-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
      gh-token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # STEP 4: AI Reliability Gate (Reusable Workflow)
  # ============================================================
  ai-reliability-gate:
    name: "🛡️ Reliability Review (AI)"
    if: github.event_name == 'pull_request'
    needs: [backend-validation]
    uses: ./.github/workflows/ai-reliability-gate.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
      backend-status: ${{ needs.backend-validation.outputs.status }}
    secrets:
      azure-endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      azure-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
      gh-token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # STEP 5: Final Gate Decision
  # ============================================================
  gate-status:
    name: "Final Gate Decision"
    runs-on: ubuntu-latest
    needs: [backend-validation, ai-security-gate, ai-reliability-gate]
    if: always()

    steps:
      - name: Check all gates
        run: |
          echo "## 🎯 PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Backend validation
          BACKEND="${{ needs.backend-validation.result }}"
          if [[ "$BACKEND" == "success" ]]; then
            echo "✅ Backend compiles & imports OK" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend validation failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Security gate
          SECURITY="${{ needs.ai-security-gate.result }}"
          SECURITY_VERDICT="${{ needs.ai-security-gate.outputs.verdict }}"
          SEVERITY="${{ needs.ai-security-gate.outputs.severity }}"

          if [[ "$SECURITY" == "success" && "$SECURITY_VERDICT" == "APPROVE" ]]; then
            echo "✅ Security Gate approved (Severity: $SEVERITY)" >> $GITHUB_STEP_SUMMARY
          elif [[ "$SECURITY" == "skipped" ]]; then
            echo "⏭️ Security Gate skipped (push event)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security Gate blocked (Severity: $SEVERITY)" >> $GITHUB_STEP_SUMMARY
          fi

          # Reliability gate
          RELIABILITY="${{ needs.ai-reliability-gate.result }}"
          RELIABILITY_VERDICT="${{ needs.ai-reliability-gate.outputs.verdict }}"
          RISK="${{ needs.ai-reliability-gate.outputs.risk-level }}"

          if [[ "$RELIABILITY" == "success" && "$RELIABILITY_VERDICT" == "APPROVE" ]]; then
            echo "✅ Reliability Gate approved (Risk: $RISK)" >> $GITHUB_STEP_SUMMARY
          elif [[ "$RELIABILITY" == "skipped" ]]; then
            echo "⏭️ Reliability Gate skipped (push event)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Reliability Gate blocked (Risk: $RISK)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine final status
          if [[ "$BACKEND" != "success" ]]; then
            echo "🚫 **BLOCKED**: Backend compilation failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "$SECURITY_VERDICT" == "BLOCK" ]]; then
            echo "🚫 **BLOCKED**: Critical security issues found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "$RELIABILITY_VERDICT" == "BLOCK" ]]; then
            echo "🚫 **BLOCKED**: High-risk reliability issues found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **PR GATE PASSED** - Safe to merge!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Modular AI Gatekeeper | Security + Reliability | Chain of Thought + Reflexion_" >> $GITHUB_STEP_SUMMARY
