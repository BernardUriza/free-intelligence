name: ✅ PR Gate (Must Pass)

# This is the ONLY workflow that should block merges to main
# Keep it FAST and PRAGMATIC - blocks only critical issues

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

env:
  PYTHON_VERSION: "3.14"  # Match pyproject.toml requirement

jobs:
  # ============================================================
  # BACKEND: Syntax + Imports (MUST PASS)
  # ============================================================
  backend-compiles:
    name: "Backend: Compiles"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install minimal deps
        run: |
          pip install --upgrade pip
          pip install fastapi pydantic structlog h5py PyYAML httpx python-jose cryptography PyJWT

      - name: Check Python syntax (all files compile)
        run: |
          echo "Checking Python syntax..."
          find backend/src -name "*.py" -exec python -m py_compile {} \;
          echo "✅ All Python files compile successfully"

      - name: Check critical imports
        run: |
          cd backend
          python -c "
          import sys
          sys.path.insert(0, 'src')

          # Critical modules that MUST import
          critical = [
              'fi_common.logging.logger',
              'fi_storage',
              'fi_auth',
              'fi_workflow',
          ]

          failed = []
          for mod in critical:
              try:
                  __import__(mod)
                  print(f'✅ {mod}')
              except Exception as e:
                  print(f'❌ {mod}: {e}')
                  failed.append(mod)

          if failed:
              print(f'\\n❌ {len(failed)} critical imports failed')
              sys.exit(1)
          print('\\n✅ All critical imports OK')
          "

  # ============================================================
  # BACKEND: Ruff Lint (MUST PASS - core modules only)
  # ============================================================
  backend-lint:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (core modules)
        run: |
          echo "Checking backend modules..."
          ruff check backend/
          echo "✅ Ruff lint passed"

  # ============================================================
  # BACKEND: Unit Tests (MUST PASS)
  # ============================================================
  backend-tests:
    name: "Backend: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-prod.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd backend
          PYTHONPATH=src python -m pytest tests/unit/ -v --tb=short
          echo "✅ Unit tests passed"

  # ============================================================
  # AI GATEKEEPER: GPT-5 Review (MUST PASS)
  # ============================================================
  ai-gatekeeper:
    name: "AI Gatekeeper"
    runs-on: ubuntu-latest
    needs: [backend-compiles, backend-lint, backend-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GPT-5 Reviews and Decides
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -e

          # NO sleep - backend-compiles already finished via needs: dependency

          # Get PR info (sanitize body to prevent prompt injection)
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body // "No description"' | head -c 2000 | sed 's/VERDICT://gi' | sed 's/BLOCK//gi' | sed 's/APPROVE//gi')

          # Get diff (exclude large/generated files)
          EXCLUDED_PATTERNS="pyinstaller/|pnpm-lock.yaml|package-lock.json|yarn.lock|\.spec$|src-tauri/gen/|acl-manifests\.json"
          DIFF=$(gh pr diff $PR_NUMBER 2>/dev/null | \
            awk -v exclude="$EXCLUDED_PATTERNS" '
              /^diff --git/ {
                skip = 0
                if (match($0, exclude)) skip = 1
              }
              !skip { print }
            ' | head -c 25000 || echo "No diff available")

          FILES_CHANGED=$(gh pr view $PR_NUMBER --json files -q '.files | length')

          # Get CI status from needs context (all dependencies)
          BACKEND_STATUS="${{ needs.backend-compiles.result }}"
          LINT_STATUS="${{ needs.backend-lint.result }}"
          TESTS_STATUS="${{ needs.backend-tests.result }}"

          PASSED_CHECKS=""
          FAILED_CHECKS=""

          # Build PASSED_CHECKS list
          [ "$BACKEND_STATUS" = "success" ] && PASSED_CHECKS="${PASSED_CHECKS}Backend:Compiles, "
          [ "$LINT_STATUS" = "success" ] && PASSED_CHECKS="${PASSED_CHECKS}Backend:Lint, "
          [ "$TESTS_STATUS" = "success" ] && PASSED_CHECKS="${PASSED_CHECKS}Backend:Tests, "
          PASSED_CHECKS="${PASSED_CHECKS%, }"  # Remove trailing comma
          [ -z "$PASSED_CHECKS" ] && PASSED_CHECKS="None"

          # Build FAILED_CHECKS list
          [ "$BACKEND_STATUS" != "success" ] && FAILED_CHECKS="${FAILED_CHECKS}Backend:Compiles, "
          [ "$LINT_STATUS" != "success" ] && FAILED_CHECKS="${FAILED_CHECKS}Backend:Lint, "
          [ "$TESTS_STATUS" != "success" ] && FAILED_CHECKS="${FAILED_CHECKS}Backend:Tests, "
          FAILED_CHECKS="${FAILED_CHECKS%, }"  # Remove trailing comma
          [ -z "$FAILED_CHECKS" ] && FAILED_CHECKS="None"

          echo "::group::Analyzing PR #$PR_NUMBER - $PR_TITLE ($FILES_CHANGED files)"
          echo "✅ Passed: $PASSED_CHECKS"
          echo "❌ Failed: $FAILED_CHECKS"

          # Build prompt using CTCO pattern (Context → Task → Constraints → Output)
          SYSTEM_MSG="You are a security-focused AI code reviewer for a medical AI platform (HIPAA-regulated). You have REAL power to block merges. Use it wisely."

          USER_MSG="CONTEXT:
          You are reviewing PR #$PR_NUMBER for AURITY, a HIPAA-compliant medical AI system handling PHI.
          - Files changed: $FILES_CHANGED
          - CI status: Passed=[$PASSED_CHECKS] Failed=[$FAILED_CHECKS]
          - This is a production-critical system with append-only audit requirements.

          TASK:
          Analyze this PR and decide: APPROVE or BLOCK based on CRITICAL issues only.
          Default to APPROVE unless you find genuine security vulnerabilities or crash bugs.

          CONSTRAINTS:
          🚫 BLOCK for these CRITICAL issues ONLY:
            1. SQL injection, XSS, command injection, path traversal
            2. Hardcoded secrets/API keys (real credentials: sk-*, api_key=*, Bearer tokens)
            3. Code that will crash at runtime (syntax errors, undefined variables)
            4. Data loss bugs (DELETE without WHERE, DROP TABLE, unprotected file operations)
            5. Authentication/authorization bypasses
            6. Infinite loops or resource exhaustion

          ⛔ MANDATORY RULES:
            - If 'Backend: Compiles' check PASSED, DO NOT block for import/module errors (build verified it works)
            - If Backend: Compiles FAILED, you MAY block for import errors

          ✅ DO NOT BLOCK for (these are SAFE):
            - Python f-string templates with {{ }} (valid escape sequences)
            - FastAPI routes with {param} placeholders (NOT string formatting)
            - File deletions/renames (intentional refactoring)
            - Code style, naming, formatting issues
            - Missing tests or documentation
            - CI/CD workflow changes
            - Architecture decisions

          KNOWN FALSE POSITIVES (ignore these patterns):
            - Pydantic validators with @field_validator decorators
            - H5py datasets with f['path/{var}'] syntax (valid HDF5 paths)
            - Auth0 JWT claims with https://aurity.app/roles format
            - Bash heredocs with <<'EOF' in shell commands

          OUTPUT:
          Return ONLY valid JSON matching this structure:
          {
            \"verdict\": \"APPROVE\" or \"WARN\" or \"BLOCK\",
            \"severity\": \"LOW\" or \"MEDIUM\" or \"HIGH\" or \"CRITICAL\",
            \"confidence\": \"HIGH\" or \"MEDIUM\" or \"LOW\",
            \"summary\": \"One sentence summary of the change\",
            \"ci_failures\": \"Explain CI failures if any, or 'All CI checks passed'\",
            \"issues\": [
              {\"type\": \"security|crash|style|etc\", \"severity\": \"LOW|MEDIUM|HIGH|CRITICAL\", \"message\": \"description\"}
            ],
            \"recommendation\": \"Brief advice for the developer\"
          }

          VERDICT RULES:
          - APPROVE: No issues, or only LOW/MEDIUM severity issues
          - WARN: HIGH severity issues that should be addressed but don't block merge
          - BLOCK: CRITICAL severity issues that MUST be fixed before merge

          SEVERITY GUIDELINES:
          - CRITICAL: SQL injection, hardcoded secrets, auth bypasses, data loss
          - HIGH: Potential crashes, resource leaks, missing validation
          - MEDIUM: Code smells, performance concerns, minor security issues
          - LOW: Style, naming, documentation

          PR DETAILS:
          <pr_metadata>
            <title>$PR_TITLE</title>
            <description>$PR_BODY</description>
          </pr_metadata>

          <diff>
          $DIFF
          </diff>"

          # Escape for JSON
          SYSTEM_ESCAPED=$(echo "$SYSTEM_MSG" | jq -Rs .)
          USER_ESCAPED=$(echo "$USER_MSG" | jq -Rs .)

          # Call Azure OpenAI with structured output (JSON schema)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/response.json \
            "${AZURE_ENDPOINT}openai/deployments/gpt-5-mini/chat/completions?api-version=2024-08-01-preview" \
            -H "Content-Type: application/json" \
            -H "api-key: $AZURE_KEY" \
            -d "{
              \"messages\": [
                {\"role\": \"system\", \"content\": $SYSTEM_ESCAPED},
                {\"role\": \"user\", \"content\": $USER_ESCAPED}
              ],
              \"max_completion_tokens\": 4000,
              \"response_format\": {
                \"type\": \"json_schema\",
                \"json_schema\": {
                  \"name\": \"code_review\",
                  \"strict\": true,
                  \"schema\": {
                    \"type\": \"object\",
                    \"properties\": {
                      \"verdict\": {
                        \"type\": \"string\",
                        \"enum\": [\"APPROVE\", \"WARN\", \"BLOCK\"]
                      },
                      \"severity\": {
                        \"type\": \"string\",
                        \"enum\": [\"LOW\", \"MEDIUM\", \"HIGH\", \"CRITICAL\"]
                      },
                      \"confidence\": {
                        \"type\": \"string\",
                        \"enum\": [\"HIGH\", \"MEDIUM\", \"LOW\"]
                      },
                      \"summary\": {
                        \"type\": \"string\"
                      },
                      \"ci_failures\": {
                        \"type\": \"string\"
                      },
                      \"issues\": {
                        \"type\": \"array\",
                        \"items\": {
                          \"type\": \"object\",
                          \"properties\": {
                            \"type\": {\"type\": \"string\"},
                            \"severity\": {\"type\": \"string\", \"enum\": [\"LOW\", \"MEDIUM\", \"HIGH\", \"CRITICAL\"]},
                            \"message\": {\"type\": \"string\"}
                          },
                          \"required\": [\"type\", \"severity\", \"message\"],
                          \"additionalProperties\": false
                        }
                      },
                      \"recommendation\": {
                        \"type\": \"string\"
                      }
                    },
                    \"required\": [\"verdict\", \"severity\", \"confidence\", \"summary\", \"ci_failures\", \"issues\", \"recommendation\"],
                    \"additionalProperties\": false
                  }
                }
              }
            }")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Azure API returned $HTTP_CODE - defaulting to APPROVE (fail-open)"
            echo "::group::Azure API Error Details"
            echo "HTTP Status: $HTTP_CODE"
            echo "Response body:"
            cat /tmp/response.json | jq '.' || cat /tmp/response.json
            echo "::endgroup::"
            echo "VERDICT=APPROVE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse structured JSON response
          REVIEW_JSON=$(cat /tmp/response.json | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW_JSON" ]; then
            echo "::warning::Empty AI response - defaulting to APPROVE"
            echo "VERDICT=APPROVE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract fields from JSON (guaranteed structure)
          VERDICT=$(echo "$REVIEW_JSON" | jq -r '.verdict // "APPROVE"')
          SEVERITY=$(echo "$REVIEW_JSON" | jq -r '.severity // "LOW"')
          CONFIDENCE=$(echo "$REVIEW_JSON" | jq -r '.confidence // "LOW"')
          SUMMARY=$(echo "$REVIEW_JSON" | jq -r '.summary // "No summary"')
          CI_FAILURES=$(echo "$REVIEW_JSON" | jq -r '.ci_failures // "Unknown"')
          ISSUES=$(echo "$REVIEW_JSON" | jq -r '.issues | map("\(.severity): \(.message)") | join(", ") // "None"')
          RECOMMENDATION=$(echo "$REVIEW_JSON" | jq -r '.recommendation // "No recommendation"')

          # Format for display
          REVIEW="VERDICT: $VERDICT"
          REVIEW="$REVIEW"$'\n'"SEVERITY: $SEVERITY"
          REVIEW="$REVIEW"$'\n'"CONFIDENCE: $CONFIDENCE"
          REVIEW="$REVIEW"$'\n'"SUMMARY: $SUMMARY"
          REVIEW="$REVIEW"$'\n'"CI FAILURES: $CI_FAILURES"
          REVIEW="$REVIEW"$'\n'"ISSUES: $ISSUES"
          REVIEW="$REVIEW"$'\n'"RECOMMENDATION: $RECOMMENDATION"

          echo "$REVIEW"
          echo "::endgroup::"

          # Apply override logic: If AI blocked for import/module but build passed, it's false positive
          if [ "$VERDICT" = "BLOCK" ] && [ "$BACKEND_STATUS" = "success" ]; then
            if echo "$ISSUES" | grep -qiE "import|module"; then
              echo "::warning::Overriding AI BLOCK - import/module concern but Backend:Compiles passed"
              VERDICT="APPROVE"
              SEVERITY="LOW"
            fi
          fi

          # Multi-Review Consensus: Second opinion if BLOCK with CRITICAL severity
          if [ "$VERDICT" = "BLOCK" ] && [ "$SEVERITY" = "CRITICAL" ]; then
            echo "::group::🔍 Multi-Review: Seeking second opinion on BLOCK decision"

            SECOND_SYSTEM="You are a pragmatic developer who values shipping code and dislikes false alarms. You're reviewing a BLOCKED PR to confirm if the block is justified."

            SECOND_USER="A strict AI reviewer blocked this PR with CRITICAL severity.

            First review verdict: BLOCK
            First review issues: $ISSUES

            Review the SAME diff and determine if the BLOCK is justified:

            <diff>
            $DIFF
            </diff>

            CONTEXT: This is a second opinion check. Only confirm BLOCK if you independently find CRITICAL security/crash bugs.
            If the issues are fixable post-merge or are false positives, recommend APPROVE or WARN instead.

            Return JSON with: verdict, severity, confidence, summary, issues[], recommendation"

            SECOND_SYSTEM_ESC=$(echo "$SECOND_SYSTEM" | jq -Rs .)
            SECOND_USER_ESC=$(echo "$SECOND_USER" | jq -Rs .)

            HTTP_CODE_2=$(curl -s -w "%{http_code}" -o /tmp/response2.json \
              "${AZURE_ENDPOINT}openai/deployments/gpt-5-mini/chat/completions?api-version=2024-08-01-preview" \
              -H "Content-Type: application/json" \
              -H "api-key: $AZURE_KEY" \
              -d "{
                \"messages\": [
                  {\"role\": \"system\", \"content\": $SECOND_SYSTEM_ESC},
                  {\"role\": \"user\", \"content\": $SECOND_USER_ESC}
                ],
                \"max_completion_tokens\": 2000,
                \"response_format\": {
                  \"type\": \"json_schema\",
                  \"json_schema\": {
                    \"name\": \"second_review\",
                    \"strict\": true,
                    \"schema\": {
                      \"type\": \"object\",
                      \"properties\": {
                        \"verdict\": {\"type\": \"string\", \"enum\": [\"APPROVE\", \"WARN\", \"BLOCK\"]},
                        \"severity\": {\"type\": \"string\", \"enum\": [\"LOW\", \"MEDIUM\", \"HIGH\", \"CRITICAL\"]},
                        \"confidence\": {\"type\": \"string\", \"enum\": [\"HIGH\", \"MEDIUM\", \"LOW\"]},
                        \"summary\": {\"type\": \"string\"},
                        \"issues\": {\"type\": \"array\", \"items\": {\"type\": \"object\", \"properties\": {\"type\": {\"type\": \"string\"}, \"severity\": {\"type\": \"string\"}, \"message\": {\"type\": \"string\"}}, \"required\": [\"type\", \"severity\", \"message\"]}},
                        \"recommendation\": {\"type\": \"string\"}
                      },
                      \"required\": [\"verdict\", \"severity\", \"confidence\", \"summary\", \"issues\", \"recommendation\"],
                      \"additionalProperties\": false
                    }
                  }
                }
              }")

            if [ "$HTTP_CODE_2" = "200" ]; then
              SECOND_JSON=$(cat /tmp/response2.json | jq -r '.choices[0].message.content // empty')
              SECOND_VERDICT=$(echo "$SECOND_JSON" | jq -r '.verdict // "BLOCK"')
              SECOND_SEVERITY=$(echo "$SECOND_JSON" | jq -r '.severity // "CRITICAL"')

              echo "Second opinion: $SECOND_VERDICT (severity: $SECOND_SEVERITY)"

              if [ "$SECOND_VERDICT" != "BLOCK" ]; then
                echo "::warning::⚠️ Disagreement detected - First: BLOCK, Second: $SECOND_VERDICT"
                echo "::warning::Downgrading to WARN to avoid false positive"
                VERDICT="WARN"
                SEVERITY="$SECOND_SEVERITY"
                REVIEW="$REVIEW"$'\n\n'"🔍 SECOND OPINION: $SECOND_VERDICT (severity: $SECOND_SEVERITY)"
                REVIEW="$REVIEW"$'\n'"Multi-review consensus: Disagreement → Downgraded to WARN"
              else
                echo "✅ Second opinion confirms BLOCK"
                REVIEW="$REVIEW"$'\n\n'"🔍 SECOND OPINION: Confirmed BLOCK"
              fi
            else
              echo "::warning::Second review API call failed - proceeding with first decision"
            fi

            echo "::endgroup::"
          fi

          # Final blocking logic: Only BLOCK if severity=CRITICAL and confidence=HIGH
          if [ "$VERDICT" = "BLOCK" ]; then
            if [ "$SEVERITY" != "CRITICAL" ] || [ "$CONFIDENCE" = "LOW" ]; then
              echo "::warning::Downgrading BLOCK to WARN (severity=$SEVERITY, confidence=$CONFIDENCE)"
              VERDICT="WARN"
            fi
          fi

          echo "VERDICT=$VERDICT" >> $GITHUB_OUTPUT
          echo "SEVERITY=$SEVERITY" >> $GITHUB_OUTPUT

          # Shadow Mode Telemetry: Log decision for analysis
          echo "::group::📊 Telemetry: Logging AI decision"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Log to workflow summary for tracking
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Verdict | $VERDICT |" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | $SEVERITY |" >> $GITHUB_STEP_SUMMARY
          echo "| Confidence | $CONFIDENCE |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #$PR_NUMBER |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $TIMESTAMP |" >> $GITHUB_STEP_SUMMARY

          # Create artifact for historical analysis
          mkdir -p /tmp/ai-gatekeeper-telemetry
          echo "$REVIEW_JSON" | jq -c "{
            pr_number: $PR_NUMBER,
            timestamp: \"$TIMESTAMP\",
            verdict: \"$VERDICT\",
            severity: \"$SEVERITY\",
            confidence: \"$CONFIDENCE\",
            summary: .summary,
            ci_failures: \"$CI_FAILURES\",
            issues: .issues,
            recommendation: .recommendation,
            backend_status: \"$BACKEND_STATUS\",
            files_changed: $FILES_CHANGED
          }" > /tmp/ai-gatekeeper-telemetry/decision-${PR_NUMBER}.json

          echo "✅ Telemetry logged to artifact"
          echo "::endgroup::"

          # Post comment with severity-aware styling
          if [ "$VERDICT" = "BLOCK" ]; then
            HEADER="## :robot: AI Gatekeeper Decision: :x: BLOCKED"
            EMOJI="🚫"
            FOOTER="*This check **BLOCKS** merge. Fix CRITICAL issues above and push again.*"
          elif [ "$VERDICT" = "WARN" ]; then
            HEADER="## :robot: AI Gatekeeper Decision: :warning: WARNING"
            EMOJI="⚠️"
            FOOTER="*This check allows merge but recommends addressing issues before merging.*"
          else
            HEADER="## :robot: AI Gatekeeper Decision: :white_check_mark: APPROVED"
            EMOJI="✅"
            FOOTER="*This check allows merge.*"
          fi

          gh pr comment $PR_NUMBER --body "$HEADER

          $REVIEW

          ---
          $FOOTER
          *Powered by Azure OpenAI GPT-5-mini*"

          echo "::notice::AI Verdict: $VERDICT (Severity: $SEVERITY)"

      - name: Upload Telemetry Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-gatekeeper-telemetry-pr-${{ github.event.pull_request.number }}
          path: /tmp/ai-gatekeeper-telemetry/
          retention-days: 90

      - name: Enforce AI Decision
        run: |
          VERDICT="${{ steps.review.outputs.VERDICT }}"
          SEVERITY="${{ steps.review.outputs.SEVERITY }}"

          if [ "$VERDICT" = "BLOCK" ]; then
            echo "::error::🚫 AI GATEKEEPER BLOCKED THIS PR (Severity: $SEVERITY)"
            echo "The AI found CRITICAL issues that must be fixed before merging."
            exit 1
          elif [ "$VERDICT" = "WARN" ]; then
            echo "::warning::⚠️ AI Gatekeeper found issues (Severity: $SEVERITY)"
            echo "Consider addressing these before merging, but merge is allowed."
          else
            echo "::notice::✅ AI Gatekeeper approved this PR"
          fi

  # ============================================================
  # SUMMARY: Final gate status
  # ============================================================
  gate-status:
    name: "PR Gate Status"
    runs-on: ubuntu-latest
    needs: [backend-compiles, backend-lint, backend-tests, ai-gatekeeper]
    if: always()

    steps:
      - name: Check gate results
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check backend compilation
          if [[ "${{ needs.backend-compiles.result }}" == "success" ]]; then
            echo "✅ Backend compiles" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend compilation failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Check backend lint
          if [[ "${{ needs.backend-lint.result }}" == "success" ]]; then
            echo "✅ Backend lint" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend lint failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Check backend tests
          if [[ "${{ needs.backend-tests.result }}" == "success" ]]; then
            echo "✅ Backend tests" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Check AI Gatekeeper (only for PRs, skipped for push to dev/main)
          AI_RESULT="${{ needs.ai-gatekeeper.result }}"
          if [[ "$AI_RESULT" == "success" ]]; then
            echo "✅ AI Gatekeeper approved" >> $GITHUB_STEP_SUMMARY
          elif [[ "$AI_RESULT" == "skipped" ]]; then
            echo "⏭️ AI Gatekeeper skipped (push event)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ AI Gatekeeper blocked" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Note:** Frontend (apps/aurity) is validated locally before deploy" >> $GITHUB_STEP_SUMMARY
          echo "Run \`cd apps/aurity && pnpm build\` before merging frontend changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if ANY check failed
          BACKEND_OK="${{ needs.backend-compiles.result }}"
          LINT_OK="${{ needs.backend-lint.result }}"
          TESTS_OK="${{ needs.backend-tests.result }}"
          AI_OK="${{ needs.ai-gatekeeper.result }}"

          if [[ "$BACKEND_OK" != "success" ]] || \
             [[ "$LINT_OK" != "success" ]] || \
             [[ "$TESTS_OK" != "success" ]] || \
             [[ "$AI_OK" != "success" && "$AI_OK" != "skipped" ]]; then
            echo "❌ **PR Gate FAILED** - Fix issues before merging" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **PR Gate PASSED** - Safe to merge" >> $GITHUB_STEP_SUMMARY
