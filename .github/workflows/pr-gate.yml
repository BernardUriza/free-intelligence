name: ✅ PR Gate (Must Pass)

# This is the ONLY workflow that should block merges to main
# Keep it FAST and PRAGMATIC - blocks only critical issues

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"  # Requires actions/setup-python@v6

jobs:
  # ============================================================
  # BACKEND: Syntax + Imports (MUST PASS)
  # ============================================================
  backend-compiles:
    name: "Backend: Compiles"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install minimal deps
        run: |
          pip install --upgrade pip
          pip install fastapi pydantic structlog h5py PyYAML httpx python-jose cryptography PyJWT

      - name: Check Python syntax (all backend files compile)
        run: |
          echo "Checking Python syntax..."
          # Compile all Python files in backend/ (not just backend/src/)
          find backend/ -name "*.py" -not -path "*/\.*" -exec python -m py_compile {} \;
          echo "✅ All Python files compile successfully"

  # ============================================================
  # BACKEND: Unit Tests (MUST PASS)
  # ============================================================
  backend-tests:
    name: "Backend: Tests"
    runs-on: ubuntu-22.04
    needs: [backend-compiles]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements-prod.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd backend
          PYTHONPATH=src pytest tests/unit -v --cov=src --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage

  # ============================================================
  # LINT: Reports issues (BLOCKS on critical errors)
  # ============================================================
  lint-report:
    name: "Lint: Report"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Fails build on critical errors (F401, F821, E999)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (report only)
        run: |
          echo "## Lint Report" >> $GITHUB_STEP_SUMMARY
          ruff check backend/src --output-format=github || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: Lint issues do not block merge" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # FRONTEND TYPES: the gate was 100% Python, so a pure-TypeScript PR shipped
  # verified only by backend tests and an LLM review — and fi-glass sat 12
  # type errors deep on main with nothing to notice. Scope is the two PUBLISHED
  # packages og118 actually consumes; `aurity` is excluded on purpose (its
  # deployment is dead and it carries 18 legacy errors — gating it would paint
  # this red forever, which is how a repo learns to ignore red).
  # ============================================================
  frontend-types:
    name: "Frontend: Types"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Type-check the published packages
        run: |
          pnpm --filter @free-intelligence/core type-check
          pnpm --filter fi-glass type-check

  # ============================================================
  # AI GATEKEEPER: BAIR inline runner. The reusable-workflow approach
  # (uses: BernardUriza/.github/...@main) kept tripping startup_failure
  # on cross-repo invocation with no useful diagnostic. Inlining trades
  # 30 LOC of duplication per repo for a reliable invocation. The
  # bair Python package still lives at BernardUriza/.github so prompt
  # tuning is centralized — only the workflow YAML is duplicated.
  # ============================================================
  ai-gatekeep:
    name: "AI Gatekeeper"
    runs-on: ubuntu-latest
    needs: [backend-compiles]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate BAIR App installation token
        # Exchanges the BAIR GitHub App (id 3878034) + private-key secret
        # for a short-lived installation access token scoped to this repo.
        # Comments posted with this token show up as `bair-gatekeeper[bot]`
        # with the App's avatar — NOT as the generic `github-actions[bot]`
        # Octocat that secrets.GITHUB_TOKEN would produce. Token expires in
        # ~1h, so leaks have a tight blast radius vs a long-lived PAT.
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BAIR_APP_ID }}
          private-key: ${{ secrets.BAIR_APP_PRIVATE_KEY }}
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install xair + bair
        # xair[openai] required even though gatekeep uses Anthropic via
        # httpx — Container.production() unconditionally instantiates
        # OpenAIProvider() at construction time. Future xair refactor:
        # make production() pick provider based on env, then drop [openai].
        run: |
          set -e
          pip install --no-cache-dir \
            "xair[openai] @ git+https://github.com/BernardUriza/xair@main" \
            "git+https://github.com/BernardUriza/.github@main#subdirectory=bair"
      - name: Run BAIR gatekeep
        id: gatekeep
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Claude Code OAuth (Max subscription) is the gatekeeper's primary
          # provider — no per-call API billing and the owner keeps it fresh for
          # og118. bair's _call_llm tries this first, then ANTHROPIC_API_KEY.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.OG118_CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # Exit code IS the gate. BLOCK or UNAVAILABLE → exit 1 → step
        # RED → ai-gatekeep job RED → gate-status RED → PR cannot merge.
        run: python -m bair gatekeep
      - name: Summarize verdict
        if: always()
        run: |
          {
            echo "## BAIR Gatekeeper Verdict"
            echo
            echo "| Field    | Value |"
            echo "|----------|-------|"
            echo "| verdict  | ${{ steps.gatekeep.outputs.verdict || 'UNAVAILABLE' }} |"
            echo "| severity | ${{ steps.gatekeep.outputs.severity || '?' }} |"
            echo "| provider | ${{ steps.gatekeep.outputs.provider || 'none' }} |"
            echo "| executed | ${{ steps.gatekeep.outputs.executed || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # SUMMARY: Final gate status
  # ============================================================
  gate-status:
    name: "PR Gate Status"
    runs-on: ubuntu-latest
    needs: [backend-compiles, backend-tests, lint-report, frontend-types, ai-gatekeep]
    if: always()

    steps:
      - name: Check gate results
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check backend compilation
          if [[ "${{ needs.backend-compiles.result }}" == "success" ]]; then
            echo "✅ Backend compiles" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend compilation failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Check backend tests (INFORMATIONAL ONLY)
          if [[ "${{ needs.backend-tests.result }}" == "success" ]]; then
            echo "✅ Backend tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Backend tests failed - review recommended but not blocking" >> $GITHUB_STEP_SUMMARY
          fi

          # Check lint report (NOW BLOCKING)
          if [[ "${{ needs.lint-report.result }}" == "success" ]]; then
            echo "✅ Lint checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Lint errors detected - BLOCKING merge" >> $GITHUB_STEP_SUMMARY
          fi

          # Check frontend types (BLOCKING)
          if [[ "${{ needs.frontend-types.result }}" == "success" ]]; then
            echo "✅ Frontend types clean (fi-glass + core)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend type errors - BLOCKING merge" >> $GITHUB_STEP_SUMMARY
          fi

          # Check AI Gatekeeper (only for PRs, skipped for push to dev/main)
          AI_RESULT="${{ needs.ai-gatekeep.result }}"
          if [[ "$AI_RESULT" == "success" ]]; then
            echo "✅ AI Gatekeeper approved" >> $GITHUB_STEP_SUMMARY
          elif [[ "$AI_RESULT" == "skipped" ]]; then
            echo "⏭️ AI Gatekeeper skipped (push event)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ AI Gatekeeper blocked" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Note:** the live app is og118 (\`apps/og118\`). \`apps/aurity\` is LEGACY —" >> $GITHUB_STEP_SUMMARY
          echo "its deployment no longer exists; do not validate against it." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if ANY critical check failed (tests are informational only)
          BACKEND_OK="${{ needs.backend-compiles.result }}"
          LINT_OK="${{ needs.lint-report.result }}"
          TYPES_OK="${{ needs.frontend-types.result }}"
          AI_OK="${{ needs.ai-gatekeep.result }}"

          if [[ "$BACKEND_OK" != "success" ]] || \
             [[ "$LINT_OK" != "success" ]] || \
             [[ "$TYPES_OK" != "success" ]] || \
             [[ "$AI_OK" != "success" && "$AI_OK" != "skipped" ]]; then
            echo "❌ **PR Gate FAILED** - Fix issues before merging" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ **PR Gate PASSED** - Safe to merge" >> $GITHUB_STEP_SUMMARY
