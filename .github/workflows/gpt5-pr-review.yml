# =============================================================================
# Azure OpenAI PR Review (GPT-5-mini)
# Powered by Azure Cognitive Services
# =============================================================================
name: GPT-5 PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: gpt5-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: GPT-5 Code Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with GPT-5-mini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -e

          # Get PR info
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body // "No description"' | head -c 2000)
          DIFF=$(gh pr diff $PR_NUMBER 2>/dev/null | head -c 30000 || echo "No diff")

          echo "::group::Reviewing PR #$PR_NUMBER: $PR_TITLE"

          # Build prompt
          PROMPT="Review this PR titled '$PR_TITLE'. Description: $PR_BODY. Changes: $DIFF. Provide: 1) Summary (1-2 sentences) 2) Issues found (if any) 3) Verdict: APPROVE/REQUEST_CHANGES/COMMENT. Be concise."

          # Escape for JSON
          PROMPT_ESCAPED=$(echo "$PROMPT" | jq -Rs .)

          # Call Azure OpenAI (GPT-5 uses reasoning tokens, need higher limit)
          RESPONSE=$(curl -sf "${AZURE_ENDPOINT}openai/deployments/gpt-5-mini/chat/completions?api-version=2024-08-01-preview" \
            -H "Content-Type: application/json" \
            -H "api-key: $AZURE_KEY" \
            -d "{\"messages\":[{\"role\":\"user\",\"content\":$PROMPT_ESCAPED}],\"max_completion_tokens\":4000}") || {
            echo "::error::Azure OpenAI API call failed"
            exit 1
          }

          # Extract review
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error"')
            echo "::error::API Error: $ERROR"
            REVIEW="⚠️ Unable to generate review: $ERROR"
          fi

          echo "::endgroup::"

          # Post comment
          gh pr comment $PR_NUMBER --body "## 🤖 GPT-5-mini Code Review

$REVIEW

---
*Powered by Azure OpenAI (GPT-5-mini)*"

          echo "✅ Review posted to PR #$PR_NUMBER"
