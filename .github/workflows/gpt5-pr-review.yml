# =============================================================================
# Azure OpenAI PR Review (GPT-5-mini) - BLOCKING MODE
# This workflow BLOCKS merges if GPT-5 finds critical issues
# Pragmatic: Only blocks for real security/crash bugs, not style
# Powered by Azure Cognitive Services
# =============================================================================
name: AI Gatekeeper (GPT-5)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: gpt5-gatekeeper-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: "🤖 AI Gatekeeper"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GPT-5-mini Reviews and Decides
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -e

          # Wait for other CI checks to complete (especially Backend: Compiles)
          echo "⏳ Waiting 90s for build checks to complete..."
          sleep 90

          # Get PR info
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body // "No description"' | head -c 2000)

          # Get diff, excluding files that commonly cause false positives due to truncation
          # Excluded: PyInstaller, lock files, generated files, Tauri schemas, large JSON
          EXCLUDED_PATTERNS="pyinstaller/|pnpm-lock.yaml|package-lock.json|yarn.lock|\.spec$|src-tauri/gen/|acl-manifests\.json"
          DIFF=$(gh pr diff $PR_NUMBER 2>/dev/null | \
            awk -v exclude="$EXCLUDED_PATTERNS" '
              /^diff --git/ {
                skip = 0
                if (match($0, exclude)) skip = 1
              }
              !skip { print }
            ' | head -c 25000 || echo "No diff available")

          FILES_CHANGED=$(gh pr view $PR_NUMBER --json files -q '.files | length')

          # Get CI check status (exclude AI reviewer itself)
          echo "📊 Getting CI check status..."
          CI_STATUS=$(gh pr checks $PR_NUMBER 2>/dev/null | grep -vE "AI Gatekeeper|AI Code Review" || echo "No checks")
          FAILED_CHECKS=$(echo "$CI_STATUS" | grep -E "^[^ ]+.*fail" | awk '{print $1}' | tr '\n' ', ' | sed 's/,$//')
          PASSED_CHECKS=$(echo "$CI_STATUS" | grep -E "^[^ ]+.*pass" | awk '{print $1}' | tr '\n' ', ' | sed 's/,$//')
          PENDING_CHECKS=$(echo "$CI_STATUS" | grep -E "^[^ ]+.*pending" | awk '{print $1}' | tr '\n' ', ' | sed 's/,$//')

          [ -z "$FAILED_CHECKS" ] && FAILED_CHECKS="None"
          [ -z "$PASSED_CHECKS" ] && PASSED_CHECKS="None"
          [ -z "$PENDING_CHECKS" ] && PENDING_CHECKS="None"

          echo "::group::Analyzing PR #$PR_NUMBER - $PR_TITLE ($FILES_CHANGED files)"
          echo "❌ Failed: $FAILED_CHECKS"
          echo "✅ Passed: $PASSED_CHECKS"
          echo "⏳ Pending: $PENDING_CHECKS"

          # Build prompt as single escaped string
          SYSTEM_MSG="You are a pragmatic but strict AI code reviewer. You have REAL power to block merges. Use it wisely - block for genuine security issues and crash bugs, but don't be pedantic about style."

          USER_MSG="Review this PR for CRITICAL issues only.

          TITLE: $PR_TITLE
          DESCRIPTION: $PR_BODY
          FILES CHANGED: $FILES_CHANGED

          CI STATUS:
          ❌ Failed checks: $FAILED_CHECKS
          ✅ Passed checks: $PASSED_CHECKS
          ⏳ Pending checks: $PENDING_CHECKS

          DIFF:
          $DIFF

          🚫 BLOCK for these CRITICAL issues (you have real power - use it!):
          1) SQL injection, XSS, command injection, path traversal
          2) Hardcoded secrets/API keys (real credentials like sk-xxx, api_key=xxx)
          3) Code that will crash at runtime (syntax errors, undefined variables)
          4) Data loss bugs (DELETE without WHERE, DROP TABLE, unprotected file operations)
          5) Authentication/authorization bypasses
          6) Infinite loops or resource exhaustion

          ⛔ MANDATORY RULE - READ THIS FIRST:
          If 'Backend: Compiles' or 'test' checks show PASSED, you MUST NOT block for import/module errors.
          The build system already verified imports work. Your diff analysis cannot see barrel exports (index.ts).
          Blocking when CI passed = FALSE POSITIVE = BAD. Trust the build system over your own analysis.

          ✅ DO NOT BLOCK for (trust the developer):
          - Python f-string templates with {{ }} - these are VALID escape sequences
          - File deletions or renames (intentional refactoring)
          - Code style, naming, or formatting
          - Missing tests or documentation
          - CI/CD workflow changes
          - Architecture decisions
          - Files excluded from this diff (build scripts, lock files) - they are reviewed separately

          📁 TYPESCRIPT/NEXT.JS BARREL EXPORTS (CRITICAL - DO NOT FALSE POSITIVE):
          - Import '@/components/foo/bar' can resolve to EITHER 'bar.tsx' OR 'bar/index.ts' (directory with barrel export)
          - If you see an import to a path like 'components/dashboard/waiting-room-host', it may be a DIRECTORY containing 'index.ts'
          - You CANNOT determine if an import is broken just by looking at the diff - only the build system knows
          - If 'Backend: Compiles' or 'test' checks PASSED, trust them over your own import analysis
          - NEVER block for 'missing module' if CI build checks passed - that's a false positive

          ⚠️ NOTE: Some files are excluded from this diff to prevent false positives:
          - pyinstaller/* (build scripts - complex but valid shell/Python)
          - *-lock.yaml, *-lock.json (generated dependency locks)
          - src-tauri/gen/* (Tauri auto-generated schemas)
          - Large JSON files (acl-manifests.json, etc.)

          RESPOND WITH THIS EXACT FORMAT:
          VERDICT: APPROVE or BLOCK
          CONFIDENCE: HIGH, MEDIUM, or LOW
          SUMMARY: One sentence summary
          CI FAILURES: If any CI checks failed, explain likely causes based on the diff. If none failed, say 'All CI checks passed.'
          ISSUES: List critical issues or None
          RECOMMENDATION: Brief advice

          Rules: Default to APPROVE. BLOCK only for critical security/crash bugs. When in doubt, APPROVE with concerns noted. Always comment on CI failures."

          # Escape for JSON using jq
          SYSTEM_ESCAPED=$(echo "$SYSTEM_MSG" | jq -Rs .)
          USER_ESCAPED=$(echo "$USER_MSG" | jq -Rs .)

          # Call Azure OpenAI (GPT-5-mini only supports temperature=1, so we omit it)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/response.json \
            "${AZURE_ENDPOINT}openai/deployments/gpt-5-mini/chat/completions?api-version=2024-08-01-preview" \
            -H "Content-Type: application/json" \
            -H "api-key: $AZURE_KEY" \
            -d "{\"messages\":[{\"role\":\"system\",\"content\":$SYSTEM_ESCAPED},{\"role\":\"user\",\"content\":$USER_ESCAPED}],\"max_completion_tokens\":4000}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Azure API returned $HTTP_CODE - defaulting to APPROVE (fail-open)"
            echo "VERDICT=APPROVE" >> $GITHUB_OUTPUT
            exit 0
          fi

          REVIEW=$(cat /tmp/response.json | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW" ]; then
            echo "::warning::Empty AI response - defaulting to APPROVE"
            echo "VERDICT=APPROVE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$REVIEW"
          echo "::endgroup::"

          # Parse verdict
          if echo "$REVIEW" | grep -qiE "VERDICT.*BLOCK"; then
            VERDICT="BLOCK"

            # OVERRIDE: If AI blocked for import/module issues and build checks passed or are running, it's likely a false positive
            # The AI cannot see barrel exports (index.ts) in directories
            if echo "$REVIEW" | grep -qiE "missing.*(module|import|file)|module-not-found|cannot.*resolve|import.*error|compile.*error.*import"; then
              if echo "$PASSED_CHECKS" | grep -qE "Backend|Compiles|test" || echo "$PENDING_CHECKS" | grep -qE "Backend|Compiles|test"; then
                echo "::warning::Overriding AI BLOCK - import/module concern but build checks passed/pending"
                echo "::warning::AI likely hit false positive on barrel exports (dir/index.ts pattern)"
                VERDICT="APPROVE"
              fi
            fi
          else
            VERDICT="APPROVE"
          fi

          echo "VERDICT=$VERDICT" >> $GITHUB_OUTPUT

          # Post comment
          if [ "$VERDICT" = "BLOCK" ]; then
            HEADER="## :robot: AI Gatekeeper Decision: :x: BLOCKED"
            FOOTER="*This check **BLOCKS** merge. Fix the issues above and push again.*"
          else
            HEADER="## :robot: AI Gatekeeper Decision: :white_check_mark: APPROVED"
            FOOTER="*This check allows merge.*"
          fi

          gh pr comment $PR_NUMBER --body "$HEADER

          $REVIEW

          ---
          $FOOTER
          *Powered by Azure OpenAI GPT-5-mini*"

          echo "::notice::AI Verdict: $VERDICT"

      # AI Gatekeeper BLOCKS merges for critical issues
      - name: Enforce AI Decision
        run: |
          if [ "${{ steps.review.outputs.VERDICT }}" = "BLOCK" ]; then
            echo "::error::🚫 AI GATEKEEPER BLOCKED THIS PR"
            echo ""
            echo "The AI found critical issues that must be fixed before merging."
            echo "Review the comment above for details."
            exit 1
          else
            echo "::notice::✅ AI Gatekeeper approved this PR"
          fi
