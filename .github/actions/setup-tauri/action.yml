name: 'Setup Tauri Build Environment'
description: 'Install Node.js, pnpm, Rust, and cache dependencies for Tauri builds'

inputs:
  rust-target:
    description: 'Rust target triple (e.g., x86_64-pc-windows-msvc)'
    required: true
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '9'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Get pnpm store path
      id: pnpm-cache
      shell: bash
      run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.path }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: '1.84.0'
        targets: ${{ inputs.rust-target }}
        components: rustfmt, clippy

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          apps/fi-monitor/src-tauri/target
          apps/aurity-desktop/src-tauri/target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('apps/**/src-tauri/src/**/*.rs') }}
        restore-keys: |
          cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
          cargo-${{ runner.os }}-
