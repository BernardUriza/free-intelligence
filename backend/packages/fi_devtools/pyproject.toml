[project]
name = "fi-devtools"
version = "0.1.0"
description = "Free Intelligence DevTools CLI (wrapper over legacy repo scripts)"
requires-python = ">=3.14"
readme = "README.md"
license = {text = "MIT"}
dependencies = [
  "typer>=0.12.0",
]

[project.scripts]
fi = "fi_devtools.cli:app"

[project.optional-dependencies]
dev = [
  "pytest>=9.0.1",
]

[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fi_devtools"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
