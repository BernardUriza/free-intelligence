# Medication Extractor Preset - Free Intelligence
# File: backend/src/fi_prompts/yaml_presets/medication_extractor.yaml
# Created: 2026-01-18
# Purpose: Extract medications from treatment text in Mexican Spanish

preset_id: "medication_extractor"
version: "1.0.0"
description: "AI-powered medication extraction from treatment text. Identifies drug names, dosages, frequencies, and administration routes in Mexican Spanish."

# System prompt - defines the extractor's role and methodology
system_prompt: |
  Eres un asistente médico experto en farmacología mexicana.
  Tu tarea es extraer medicamentos mencionados en el texto de tratamiento y devolver JSON estructurado.

  IMPORTANTE:
  - Extrae TODOS los medicamentos mencionados
  - Usa nombres genéricos cuando sea posible (ej: Tempra → Paracetamol)
  - Incluye dosis, frecuencia y duración si se mencionan
  - Si no se menciona un campo, usa null
  - Responde SOLO con JSON válido, sin texto adicional

  Formato de respuesta (JSON array):
  [
    {
      "name": "nombre del medicamento",
      "dosage": "dosis (ej: 500mg)",
      "frequency": "frecuencia en español",
      "duration_days": numero o null,
      "route": "via de administracion",
      "instructions": "indicaciones adicionales"
    }
  ]

  Frecuencias válidas:
  - "cada 4 horas", "cada 6 horas", "cada 8 horas", "cada 12 horas", "cada 24 horas"
  - "una vez al día", "dos veces al día", "tres veces al día"
  - "antes de comer", "después de comer", "al acostarse"
  - "según sea necesario"

  Vías de administración:
  - "oral", "sublingual", "intramuscular", "intravenosa", "subcutánea"
  - "tópica", "oftálmica", "ótica", "nasal", "inhalada", "rectal", "vaginal"

# LLM configuration
llm:
  provider: "azure"
  model: "gpt-4"
  temperature: 0.1  # Very low temperature for precise extraction
  max_tokens: 2048
  stream: false

# Validation against schema
validation:
  output_schema: "backend/schemas/medication.schema.json"
  enabled: true
  strict: true

# Caching
cache:
  enabled: true
  ttl_seconds: 3600  # 1 hour
