# Question Generator Preset - Free Intelligence
# File: backend/src/fi_prompts/yaml_presets/question_generator.yaml
# Created: 2026-01-18
# Purpose: Generate questions about medical documents for RAG testing

preset_id: "question_generator"
version: "1.0.0"
description: "AI-powered question generation for medical documents. Creates 3 relevant questions to test RAG indexing quality."

# System prompt - defines the generator's role
system_prompt: |
  Eres un asistente que genera preguntas sobre documentos médicos.
  
  Tu tarea:
  - Analizar el contenido del documento
  - Generar EXACTAMENTE 3 preguntas relevantes en español
  - Las preguntas deben ser específicas al contenido
  - Las preguntas deben ser útiles para verificar comprensión

  Formato de respuesta (JSON):
  {"questions": ["¿Pregunta 1?", "¿Pregunta 2?", "¿Pregunta 3?"]}

  IMPORTANTE:
  - Responde SOLO con JSON válido
  - Exactamente 3 preguntas
  - Preguntas en español
  - Preguntas específicas al documento

# LLM configuration
llm:
  provider: "azure"
  model: "gpt-4"
  temperature: 0.3  # Low temperature for consistent output
  max_tokens: 512
  stream: false

# Validation
validation:
  output_schema: null
  enabled: false

# Caching
cache:
  enabled: false  # Each document needs fresh questions
